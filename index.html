<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absensi Dosen</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

<style>
:root{
  --primary:#6366f1;
  --bg:#0f172a;
  --card:#1e293b;
  --success:#22c55e;
  --danger:#ef4444;
}
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px 10px;
  color:white;
}
.card{
  background:var(--card);
  padding:20px;
  width:100%;
  max-width:420px;
  border-radius:20px;
  box-shadow:0 15px 40px rgba(0,0,0,.4);
}
.time{
  text-align:center;
  font-size:14px;
  margin:5px 0;
  opacity:.8;
}
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:50px;
  font-weight:600;
  cursor:pointer;
  margin-bottom:10px;
  transition:.3s;
}
button:hover{transform:translateY(-2px)}
.btn-primary{background:var(--primary);color:white}
.btn-success{background:var(--success);color:white}
.btn-danger{background:var(--danger);color:white}

select,
input[type="text"]{
  width:100%;
  padding:12px 40px 12px 12px; /* ruang untuk icon select */
  border-radius:12px;
  background:#334155;
  color:white;
  border:2px solid #334155;
  margin-bottom:12px;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
  font-size:14px;
  outline:none;
}

/* Hilangkan tampilan default select */
select{
  appearance:none;
  -webkit-appearance:none;
  -moz-appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg fill='white' height='20' viewBox='0 0 20 20' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M5 7l5 5 5-5z'/></svg>");
  background-repeat:no-repeat;
  background-position:right 12px center;
  background-size:16px;
}

/* Focus */
select:focus,
input[type="text"]:focus{
  border:2px solid #6366f1;
  box-shadow:none;
}
#video{
  border:1px solid #334155;
  border-radius:12px;
  width:100%;
  max-width:280px;
  margin-bottom:8px;
}

.toast{
  position:fixed;
  top:30%;
  left:50%;
  transform:translate(-50%,-50%) scale(.95);
  width:90%;
  max-width:420px;
  background:rgba(255,255,255,.6);
  backdrop-filter:blur(12px);
  padding:18px;
  border-radius:16px;
  font-weight:500;
  text-align:center;
  color:#000;
  box-shadow:0 20px 60px rgba(0,0,0,.3);
  opacity:0;
  transition:.3s;
  z-index:9999;
}
.toast.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}
</style>
</head>

<body>

<div class="card">

<div style="text-align:center;margin-bottom:10px;">
<img src="https://raw.githubusercontent.com/zuyudh-pixel/absensi-V2/main/logo.png" style="width:80px;">
<div style="font-size:10px;color:#a1a1aa;">UIN KIAI AGENG MUHAMMAD BESARI PONOROGO</div>
<div style="font-size:14px;color:#cbd5e1;">PASCASARJANA</div>
<div style="font-size:16px;color:#facc15;margin-top:5px;">ABSENSI DOSEN PENGAMPU</div>
</div>

<div class="time" id="timeNow"></div>

<!-- LOGIN AREA -->
<div id="loginArea">
<div style="display:flex;flex-direction:column;align-items:center;">
<video id="video" playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>
<button class="btn-primary" id="btnScan">Scan Barcode</button>
<input type="file" id="fileInput" accept="image/*" onchange="scanFile(this)">
</div>

<div style="text-align:center;margin-top:8px;">
<span onclick="refreshPage()" style="font-size:13px;color:#60a5fa;cursor:pointer;text-decoration:underline;">Refresh</span>
</div>
</div>

<!-- ABSEN AREA -->
<div id="absenArea" style="display:none;margin-top:15px;">
<h4 id="userInfoAbsen" style="text-align:center;color:#facc15;"></h4>

<label>Absensi</label>
<select id="tipe">
<option value="Masuk">Masuk</option>
<option value="Pulang">Pulang</option>
</select>

<label>Lokasi Kerja</label>
<select id="workfrom">
<option value="WFO">Kampus (WFO)</option>
<option value="WFA">WFA</option>
</select>

<label>Kelas (Saat Masuk)</label>
<input type="text" id="kegiatan" placeholder="Contoh: 25.MHKI.A; 25.MPAI.B;...">

<div style="display:flex;gap:8px;margin-top:12px;">
<button class="btn-success" id="btnAbsen" onclick="absen()">Kirim</button>
<button class="btn-primary" onclick="bukaLaporan()">Laporan</button>
<button class="btn-danger" onclick="logout()">Logout</button>
</div>
</div>

</div>

<div class="toast" id="toast"></div>

<script>
const WEB_APP_URL="https://script.google.com/macros/s/AKfycbwz8fbm1csIeeoNKMf69mR_7WgbjDadh0_-OcM4rpNQsITl8mrQrDgC3kQmXDjY4tDInw/exec";

let currentUser={}, userLat=null, userLng=null;
let videoStream=null, scanning=false;

const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

setInterval(()=>{
document.getElementById("timeNow").innerText=
new Date().toLocaleDateString()+" - "+new Date().toLocaleTimeString();
},1000);

function showToast(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),3000);
}

function getLocation(){
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(pos=>{
userLat=pos.coords.latitude;
userLng=pos.coords.longitude;
});
}
}

document.getElementById("btnScan").addEventListener("click",toggleScanner);

function toggleScanner(){
if(scanning){ stopScanner(); showToast("Scanner dimatikan ❌"); return; }
startScanner();
}

async function startScanner(){
try{
videoStream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:{ideal:"environment"}}
});
video.srcObject=videoStream;
await video.play();
scanning=true;
document.getElementById("btnScan").innerText="Stop Scan";
scanLoop();
}catch{
showToast("Gagal akses kamera ❌");
}
}

function scanLoop(){
if(!scanning) return;

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;
ctx.drawImage(video,0,0,canvas.width,canvas.height);

const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
const code=jsQR(imageData.data,imageData.width,imageData.height,{
inversionAttempts:"dontInvert"
});

if(code){
stopScanner();
processBarcode(code.data);
return;
}

requestAnimationFrame(scanLoop);
}

function stopScanner(){
if(videoStream){
videoStream.getTracks().forEach(track=>track.stop());
videoStream=null;
}
scanning=false;
video.srcObject=null;
document.getElementById("btnScan").innerText="Scan Barcode";
}

function scanFile(input){
if(!input.files.length) return;
const reader=new FileReader();
reader.onload=e=>{
const img=new Image();
img.onload=()=>{
canvas.width=img.width;
canvas.height=img.height;
ctx.drawImage(img,0,0);
const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
const code=jsQR(imageData.data,imageData.width,imageData.height);
if(code){
showToast("Barcode terdeteksi ✅");
processBarcode(code.data);
}else{
showToast("Barcode tidak terbaca ❌");
}
input.value="";
};
img.src=e.target.result;
};
reader.readAsDataURL(input.files[0]);
}

function processBarcode(data){
if(!data.includes("|")){ showToast("Format barcode salah ❌"); return; }
loginWithBarcode(data);
}

async function loginWithBarcode(data){
const [id,password]=data.split("|");
const fd=new FormData();
fd.append("action","login");
fd.append("id",id);
fd.append("password",password);
try{
const res=await fetch(WEB_APP_URL,{method:"POST",body:fd});
const r=await res.json();
if(r.status==="success"){
currentUser={id,nama:r.nama};
document.getElementById("loginArea").style.display="none";
document.getElementById("absenArea").style.display="block";
document.getElementById("userInfoAbsen").innerText=r.nama;
showToast("Login berhasil ✅");
getLocation();
}else{
showToast("Barcode tidak valid ❌");
}
}catch{
showToast("Server error ❌");
}
}

function logout(){
currentUser={};
document.getElementById("loginArea").style.display="block";
document.getElementById("absenArea").style.display="none";
stopScanner();
showToast("Logout berhasil");
}

function refreshPage(){
stopScanner();
location.reload();
}

// Absensi
async function absen(){

// ===============================
  // BATAS JAM ABSEN (13:00 - 22:00)
  // ===============================
  const now = new Date();
  const hour = now.getHours();
  const minute = now.getMinutes();
  const second = now.getSeconds();

  const currentTime = hour * 3600 + minute * 60 + second;
  const startTime = 15 * 3600; // 13:00:00
  const endTime   = 22 * 3600; // 22:00:00

  if(currentTime < startTime || currentTime > endTime){
    showToast("Absensi hanya bisa dilakukan pukul 15.00-22.00 WIB. sesuai jadwal perkuliahan❗");
    return;
  }
  
  // ===============================
// VALIDASI KELAS SAAT MASUK
// ===============================
const tipe = document.getElementById("tipe").value;
const kegiatan = document.getElementById("kegiatan").value.trim();

if(tipe === "Masuk" && kegiatan === ""){
  showToast("Kelas wajib diisi saat absen MASUK ❗");
  document.getElementById("kegiatan").focus();
  return;
}
  
  // ===============================
  // VALIDASI GPS
  // ===============================
  if(!userLat){ 
    showToast("GPS belum aktif/posisi belum terdeteksi!"); 
    return; 
  }

  const btn = document.getElementById("btnAbsen");
  btn.classList.add("btn-loading");
  btn.innerText = "Memproses...";

  const formData = new FormData();
  formData.append("action","absen");
  formData.append("id", currentUser.id);
  formData.append("nama", currentUser.nama);
  formData.append("tipe", document.getElementById("tipe").value);
  formData.append("workfrom", document.getElementById("workfrom").value);
  formData.append("kegiatan", document.getElementById("kegiatan").value);
  formData.append("latitude", userLat);
  formData.append("longitude", userLng);

  try{
    const res = await fetch(WEB_APP_URL,{ method:"POST", body:formData });
    const result = await res.json();

    if(result.status==="success"){ 
      showToast("Absensi berhasil ✅"); 
    }
    else if(result.status==="duplicate_masuk"){ 
      showToast("Anda sudah absen MASUK hari ini ❗"); 
    }
    else if(result.status==="no_masuk"){
      showToast("Anda belum absen MASUK hari ini ❗");
    }
    else if(result.status==="updated_pulang"){
      showToast("Absensi PULANG berhasil diupdate ✅");
    }
    else if(result.status==="out_of_radius"){ 
      showToast("Di luar radius kampus ❌"); 
    }
    else{ 
      showToast("Gagal absen ❌"); 
    }

  }catch(e){
    console.error(e);
    showToast("Terjadi kesalahan server ❌");
  }

  // Reset tombol
  btn.classList.remove("btn-loading");
  btn.innerText = "Kirim Absensi";
}

// Logout
function logout(){
  currentUser={};
  document.getElementById("loginArea").style.display="block";
  document.getElementById("absenArea").style.display="none";
  document.getElementById("userInfoAbsen").innerText="";
  document.getElementById("userIdDisplay").innerText="";
  stopScanner();
}

function refreshPage(){
  stopScanner();   // WAJIB dipanggil

  currentUser = {};
  userLat = null;
  userLng = null;

  document.getElementById("loginArea").style.display="block";
  document.getElementById("absenArea").style.display="none";
  document.getElementById("userInfoAbsen").innerText="";
  document.getElementById("userIdDisplay").innerText="";
  document.getElementById("kegiatan").value="";
  document.getElementById("tipe").selectedIndex = 0;
  document.getElementById("workfrom").selectedIndex = 0;
  document.getElementById("btnScan").innerText="Scan Barcode";

  showToast("Tampilan direset ✅");
}
function bukaLaporan(){
  if(!currentUser.id){
    showToast("Silakan login dulu ❗");
    return;
  }

  const url = "laporanperdosen.html?id=" + encodeURIComponent(currentUser.id);
  window.open(url, "_blank");
}

function bukaLaporan(){
if(!currentUser.id){
showToast("Silakan login dulu ❗");
return;
}
const url="laporanperdosen.html?id="+encodeURIComponent(currentUser.id);
window.open(url,"_blank");
}
</script>

</body>
</html>
