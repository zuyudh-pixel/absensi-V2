<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Laporan Absensi Dosen</title>
<meta name="theme-color" content="#0f172a">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*,
*::before,
*::after{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html{ font-size:16px; }

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(90deg,#0f3d3e,#0b1f3a);
  min-height:100vh;
  padding:20px 16px;
  color:#ffffff;
}

/* CONTAINER */
.container{
  max-width:480px;
  margin:auto;
}

/* CARD GLASS */
.card{
  background:linear-gradient(145deg,rgba(255,255,255,0.12),rgba(255,255,255,0.05));
  backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);
  border-radius:28px;
  padding:26px 22px;
  border:1px solid rgba(255,255,255,0.18);
  box-shadow:
    0 0 40px rgba(16,185,129,0.25),
    0 25px 60px rgba(0,0,0,0.5);
}

/* TITLE */
h2{
  margin:0 0 24px 0;
  text-align:center;
  font-size:1.25rem;
  font-weight:700;
  color:#facc15;
  letter-spacing:0.6px;
}

/* LABEL */
label{
  font-size:0.85rem;
  opacity:0.85;
  margin-bottom:6px;
  display:block;
}

/* FORM ROW */
.row{
  display:flex;
  flex-direction:column;
  gap:18px;
  margin-bottom:24px;
}

/* INPUT & SELECT */
input[type="date"],
select,
input[type="text"]{
  width:100%;
  padding:14px 18px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.25);
  background:rgba(255,255,255,0.10);
  color:#ffffff;
  font-size:0.95rem;
  outline:none;
  transition:all 0.25s ease;
}

input:focus,
select:focus{
  border-color:#34d399;
  box-shadow:0 0 15px rgba(52,211,153,0.6);
}

/* PRIMARY BUTTON (HIJAU) */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:24px;
  font-size:0.95rem;
  font-weight:600;
  cursor:pointer;
  transition:all 0.25s ease;
}

button:not(.btn-back){
  margin-top:8px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:#ffffff;
  box-shadow:0 8px 25px rgba(34,197,94,0.5);
}

button:not(.btn-back):active{
  transform:scale(0.96);
}

/* BACK BUTTON (GLASS CYAN) */
.btn-back{
  margin-top:14px;
  background:linear-gradient(135deg,#14b8a6,#0ea5e9);
  color:#ffffff;
  border:none;
  box-shadow:0 8px 25px rgba(20,184,166,0.4);
}

/* TABLE */
.table-wrapper{
  margin-top:32px;
  overflow-x:auto;
  border-radius:18px;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:0.85rem;
  min-width:700px;
}

th{
  padding:14px 10px;
  background:rgba(255,255,255,0.12);
  color:#facc15;
  font-weight:600;
  text-align:center;
}

td{
  padding:12px 10px;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

td.no-wrap{
  white-space:nowrap;
}

/* SUMMARY */
.summary-row td{
  padding:16px;
  font-weight:600;
  color:#facc15;
  background:rgba(250,204,21,0.1);
}
</style>
</head>

<body>
<div class="container">
  <div class="card">

    <h2>📊 Laporan Absensi Saya</h2>

    <div class="row">
      <div style="flex:1">
        <label>Tanggal Awal</label>
        <input type="date" id="tglAwal">
      </div>
      <div style="flex:1">
        <label>Tanggal Akhir</label>
        <input type="date" id="tglAkhir">
      </div>
    </div>

    <button onclick="loadData()">Lihat Laporan</button>
    <div id="hasil"></div>
    <button class="btn-back" onclick="window.close()">⬅ Kembali</button>

  </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwz8fbm1csIeeoNKMf69mR_7WgbjDadh0_-OcM4rpNQsITl8mrQrDgC3kQmXDjY4tDInw/exec";

// ================================
// SIMPAN ID & HAPUS DARI URL
// ================================
(function(){
  const params = new URLSearchParams(window.location.search);
  const idFromUrl = params.get("id");

  if(idFromUrl){
    sessionStorage.setItem("userId", idFromUrl);
    window.history.replaceState({}, document.title, window.location.pathname);
  }
})();

function getUserId(){
  return sessionStorage.getItem("userId");
}

function loadData(){
  const userId = getUserId();

  if(!userId){
    document.getElementById("hasil").innerHTML =
      "<p style='color:red'>Session ID tidak ditemukan</p>";
    return;
  }

  const tglAwal = document.getElementById("tglAwal").value;
  const tglAkhir = document.getElementById("tglAkhir").value;

  const url = WEB_APP_URL +
    "?action=laporan&id=" + encodeURIComponent(userId) +
    "&awal=" + encodeURIComponent(tglAwal || "") +
    "&akhir=" + encodeURIComponent(tglAkhir || "");

  fetch(url)
    .then(res => res.json())
    .then(data => tampilkan(data))
    .catch(() => {
      document.getElementById("hasil").innerHTML =
        "<p style='color:red'>Gagal mengambil data</p>";
    });
}

// ================================
// FUNCTION TAMPILKAN (TIDAK DIUBAH)
// ================================
function tampilkan(data){

  if(!data || data.length===0){
    document.getElementById("hasil").innerHTML="<p>Tidak ada data</p>";
    return;
  }

  const grouped={};
  let totalWFO=0,totalWFA=0,totalIjin=0;

  data.forEach(r=>{
    if(!r.tanggal) return;

    const d = new Date(r.tanggal);
    const key = d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getDate()).padStart(2,'0');

    if(!grouped[key]){
      grouped[key]={tanggal:key,masuk:"",keluar:"",lokasi:"",kegiatan:"",isIjin:false};
    }

    const jam = String(d.getHours()).padStart(2,'0')+":"+String(d.getMinutes()).padStart(2,'0')+":"+String(d.getSeconds()).padStart(2,'0');

    const jenis=(r.tipe||"").toLowerCase().trim();
    const workfrom=(r.workfrom||"").trim();
    const kegiatanSheet=(r.kegiatan||"").trim();

    if(jenis==="ijin"){
      grouped[key].kegiatan="Ijin";
      totalIjin++;
      return;
    }

    if(jenis==="masuk"){
      grouped[key].masuk=jam;
      grouped[key].lokasi=workfrom;

      if(workfrom==="WFO"){
        totalWFO++;
        grouped[key].kegiatan=kegiatanSheet;
      } else if(workfrom==="WFA"){
        totalWFA++;
        grouped[key].kegiatan=kegiatanSheet;
      }
    }

    if(jenis==="pulang"){
      grouped[key].keluar=jam;
    }
  });

  function hitungDurasi(m,k){
    if(!m||!k) return "-";
    const masuk=new Date("1970-01-01T"+m);
    const keluar=new Date("1970-01-01T"+k);
    const diff=(keluar-masuk)/1000;
    if(diff<=0) return "-";
    const jam=Math.floor(diff/3600);
    const menit=Math.floor((diff%3600)/60);
    return String(jam).padStart(2,'0')+":"+String(menit).padStart(2,'0');
  }

  let html=`<div class="table-wrapper"><table>
  <thead><tr>
  <th>Tanggal</th><th>Jam Masuk</th><th>Jam Keluar</th>
  <th>Lokasi</th><th>Lama Kerja</th><th>Keterangan</th>
  </tr></thead><tbody>`;

  Object.values(grouped)
  .sort((a,b)=>new Date(a.tanggal)-new Date(b.tanggal))
  .forEach(row=>{
    const d=new Date(row.tanggal);
    const tglFormat=String(d.getDate()).padStart(2,'0')+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+d.getFullYear();
    const lama=hitungDurasi(row.masuk,row.keluar);

    html+=`<tr>
      <td class="no-wrap">${tglFormat}</td>
      <td>${row.masuk||"-"}</td>
      <td>${row.keluar||"-"}</td>
      <td>${row.lokasi||"-"}</td>
      <td>${lama}</td>
      <td class="no-wrap">${row.kegiatan||"-"}</td>
    </tr>`;
  });

  html+=`</tbody>
  <tfoot><tr class="summary-row">
  <td colspan="6">Total WFO: ${totalWFO} | Total WFA: ${totalWFA} | Total Ijin: ${totalIjin}</td>
  </tr></tfoot></table></div>`;

  document.getElementById("hasil").innerHTML=html;
}

window.onload=function(){
  loadData();
  setInterval(loadData,30000);
}

// ===============================
// ANTI INSPECT SUPER AGRESIF
// ===============================

// Blokir klik kanan
document.addEventListener("contextmenu", e => e.preventDefault());

// Blokir shortcut developer tools
document.addEventListener("keydown", function(e){

  // F12
  if (e.key === "F12") e.preventDefault();

  // Ctrl+Shift+I/J/C
  if (e.ctrlKey && e.shiftKey && 
     (e.key === "I" || e.key === "J" || e.key === "C")) {
    e.preventDefault();
  }

  // Ctrl+U
  if (e.ctrlKey && e.key === "u") {
    e.preventDefault();
  }

  // Ctrl+S
  if (e.ctrlKey && e.key === "s") {
    e.preventDefault();
  }

});
</script>
</body>
</html>
