<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absensi Dosen Pengampu</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px 10px;
  color:white;
  position:relative;
  overflow:hidden;
}

/* Video background fullscreen dengan blur + parallax transform */
#bgVideo {
  position:fixed;
  top:0;
  left:0;
  width:110vw;  /* lebih lebar untuk efek geser */
  height:110vh; /* lebih tinggi untuk efek geser */
  object-fit:cover;
  //filter: blur(8px);
  transform: translate3d(0,0,0) scale(1.05);
  transition: transform 0.1s ease-out;
  z-index:-2;
}

/* Overlay tipis */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.3);
  z-index:-1;
}

/* Card */
.card{
  background: rgba(251, 251, 252, 0.678); /* 50% transparan */
  // background:#1e293b;
  padding:20px;
  width:100%;
  max-width:420px;
  border-radius:20px;
  box-shadow:0 15px 40px rgba(0,0,0,.6);
  text-align:center;
  position:relative;
   border: 2px solid #ffffff; /* border putih */
}
video#video{
  width:100%;
  max-width:280px;
  border-radius:12px;
  border: 2px solid #ffffff;
}

.scan-box{
  position:absolute;
  width:180px;
  height:180px;
  border:3px solid #22c55e;
  border-radius:16px;
  top:58%;
  left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
  box-shadow:0 0 20px rgba(34,197,94,.5);
}

.status{
  margin-top:12px;
  font-size:14px;
  font-weight:600;
}
.status.ready{ color:#4405d6; }
.status.processing{ color:#4606f7; }
.status.error{ color:#910303; }

.time {
  font-size: 16px;
  color: rgba(255,255,255,.95);
  font-weight: 900;  
  text-shadow: 2px 2px 4px #000000;
  margin: 5px 0;
}

.toast{
  position:fixed;
  top:30%;
  left:50%;
  transform:translate(-50%,-50%) scale(.9);
  background:rgba(255,255,255,.95);
  color:#111;
  padding:18px 24px;
  border-radius:16px;
  font-weight:600;
  box-shadow:0 20px 60px rgba(0,0,0,.3);
  opacity:0;
  transition:.3s;
  z-index:9999;
  max-width:90%;
  text-align:center;
}
.toast.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}
</style>
</head>

<body>

<video autoplay muted loop id="bgVideo">
  <source src="https://absensi-v2-self.vercel.app/VID-20260214-WA0000.mp4" type="video/mp4">
  Browsermu tidak mendukung video background.
</video>

<div class="card">

  <img src="https://raw.githubusercontent.com/zuyudh-pixel/absensi-V2/main/logo.png" style="width:80px;">
  <div style="font-size:16px;color:#010107; font-weight:700;">
  UIN KIAI AGENG MUHAMMAD BESARI PONOROGO
  </div>
  <div style="font-size:26px;color:#79030d; font-weight:700;">
    PASCASARJANA
  </div>
  <div style="font-size:18px;color:#410492;margin-top:5px; font-weight:700;">
    ABSENSI DOSEN PENGAMPU
  </div>
  <div class="time" id="timeNow"></div>

  <div style="position:relative; display:flex; justify-content:center;">
    <video id="video" autoplay playsinline></video>
    <div class="scan-box"></div>
  </div>

  <div class="status ready" id="statusText">🟢 Siap Scan Barcode</div>

</div>

<div class="toast" id="toast"></div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzAf8h_8Je8-60pLsqP2-O6qxM-K3VqDPwX3ONeZOx-YPlv0vOKNC0BdHa7uzjcYuIilw/exec";

let videoStream=null;
let isProcessing=false;
const video=document.getElementById("video");
const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");
const statusText=document.getElementById("statusText");
const bgVideo=document.getElementById("bgVideo");

// ================= JAM =================
setInterval(()=>{
  document.getElementById("timeNow").innerText=
    new Date().toLocaleDateString()+" - "+
    new Date().toLocaleTimeString();
},1000);

// ================= FULLSCREEN =================
function enterFullscreen() {
  const el = document.documentElement;
  if (el.requestFullscreen) {
    el.requestFullscreen().catch(err => console.warn("Fullscreen gagal:", err));
  }
}
function initFullscreen() {
  ["pointerdown","keydown","touchstart"].forEach(evt=>{
    window.addEventListener(evt,function handler(){
      enterFullscreen();
      window.removeEventListener(evt,handler);
    });
  });
}
window.addEventListener("load", initFullscreen);

// ================= BEEP =================
function beep(){
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const oscillator = audioCtx.createOscillator();
  oscillator.type="sine";
  oscillator.frequency.setValueAtTime(900, audioCtx.currentTime);
  oscillator.connect(audioCtx.destination);
  oscillator.start();
  setTimeout(()=>oscillator.stop(),120);
}

// ================= STATUS =================
function setStatus(text,mode){
  statusText.innerText=text;
  statusText.className="status "+mode;
}
function showToast(message){
  const t=document.getElementById("toast");
  t.innerText=message;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),4000);
}

// ================= CAMERA =================
async function startCamera(){
  try{
    videoStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:"environment"}}});
    video.srcObject=videoStream;
    await video.play();
    scanLoop();
  }catch{
    setStatus("❌ Kamera gagal","error");
  }
}

// ================= SCAN LOOP =================
function scanLoop(){
  if(video.readyState === video.HAVE_ENOUGH_DATA){
    canvas.width=video.videoWidth;
    canvas.height=video.videoHeight;
    ctx.drawImage(video,0,0);
    const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
    const code=jsQR(imageData.data,imageData.width,imageData.height);
    if(code && !isProcessing){
      isProcessing=true;
      processBarcode(code.data);
    }
  }
  requestAnimationFrame(scanLoop);
}

// ================= PROCESS =================
async function processBarcode(data){
  if(!data.includes("|")){
    setStatus("❌ Format salah","error");
    cooldown();
    return;
  }
  const [id,password]=data.split("|");
  const fd=new FormData();
  fd.append("action","login");
  fd.append("id",id);
  fd.append("password",password);

  try{
    setStatus("⏳ Memproses...","processing");
    const res=await fetch(WEB_APP_URL,{method:"POST",body:fd});
    const r=await res.json();

    if(r.status==="success"){
      beep();
      setStatus("✅ "+r.tipe+" Berhasil","ready");
      showToast("Selamat, Bpk/Ibu " + r.nama + ", berhasil. Terimakasih.");
    } else if(r.status==="absen_sudah_lengkap"){
      beep();
      setStatus("✅ Bpk/Ibu...Sudah lengkap hari ini","ready");
      showToast("Bpk/Ibu " + r.nama + ", Sudah lengkap hari ini. Terimakasih.");
    } else{
      beep();
      setStatus("❌ Login gagal","error");
    }
  }catch{
    beep();
    setStatus("❌ Server error","error");
  }
  cooldown();
}

// ================= COOLDOWN =================
function cooldown(){
  setTimeout(()=>{
    isProcessing=false;
    setStatus("🟢 Siap Scan Barcode","ready");
  },2000);
}
setInterval(()=>{
  isProcessing=false;
  setStatus("🟢 Siap Scan Barcode","ready");
},300000);

// ================= START CAMERA =================
window.onload=startCamera;

// ================= PARALLAX EFFECT =================
document.addEventListener("mousemove", e=>{
  const x = (e.clientX/window.innerWidth - 0.5) * 20; // max ±10px
  const y = (e.clientY/window.innerHeight - 0.5) * 20;
  bgVideo.style.transform=`translate3d(${x}px,${y}px,0) scale(1.05)`;
});
window.addEventListener("scroll", ()=>{
  const scrollY = window.scrollY;
  bgVideo.style.transform=`translate3d(0,${scrollY*0.05}px,0) scale(1.05)`;
});
</script>
</body>
</html>
