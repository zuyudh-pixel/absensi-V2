
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Manajemen Data Pegawai</title>
<style>
body{
    font-family:Arial, sans-serif;
    background: radial-gradient(circle at 15% 20%, rgba(34,211,238,.25), transparent 40%),
                radial-gradient(circle at 85% 80%, rgba(16,185,129,.25), transparent 40%),
                linear-gradient(135deg,#0f172a,#0b1120 60%,#0a0f1c);
    margin:0;
    padding:30px;
    min-height:100vh;
}
.container{
    max-width:900px;
    background:white;
    padding:25px;
    border-radius:8px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    margin:auto;
}
h2{margin-top:0;margin-bottom:20px;}
.topbar{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
    flex-wrap:wrap;
    gap:10px;
}
input, button{
    padding:7px;
    border:1px solid #ccc;
    border-radius:4px;
    font-size:14px;
}
input[type=text]{flex:1;}
button{cursor:pointer;}
.btnAdd{background:#007bff;color:white;}
.btnEdit{background:#ffc107;}
.btnDelete{background:#dc3545;color:white;}
.btnSave{background:#28a745;color:white;}
.btnClose{background:#6c757d;color:white;}
.btnShowPass{background:#17a2b8;color:white;}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}
th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}
th{background:#eee;}
.pagination{
    margin-top:10px;
    text-align:center;
}
.pagination button{margin:3px;}
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    z-index:999;
}
.modal-content{
    background:white;
    width:400px;
    margin:8% auto;
    padding:20px;
    border-radius:6px;
    position:relative;
}
.modal h3{margin-top:0;}

.text-left{
    text-align:left;
}
.back-link{
    margin-bottom:10px;
}

.back-link a{
    text-decoration:none;
    color:#22d3ee;
    font-weight:bold;
}

.back-link a:hover{
    text-decoration:underline;
}
</style>
</head>
<body>

<div class="container">

<h2>Manajemen Data Dosen/Tendik</h2>

<div class="back-link">
<a href="javascript:history.back()">← Kembali</a>
</div>
<div class="topbar">
<input type="text" id="search" placeholder="Cari nama..." onkeyup="renderTable()">
<button class="btnAdd" onclick="openAddModal()">Tambah Pegawai</button>
</div>

<table>
<thead>
<tr>
<th>No</th>
<th>NIK</th>
<th>Nama</th>
<th>Bagian</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
<div class="pagination" id="pagination"></div>
<div class="back-link">
<a href="javascript:history.back()">← Kembali</a>
</div>
</div>

<!-- MODAL EDIT / ADD -->
<div class="modal" id="modalForm">
<div class="modal-content">
<h3 id="modalTitle">Edit Pegawai</h3>
<input type="hidden" id="row">
<label>NIK</label><br>
<input type="text" id="editNik"><br><br>
<label>Nama</label><br>
<input type="text" id="editNama"><br><br>
<label>Bagian</label><br>
<input type="text" id="editBagian"><br><br>
<label>Password</label><br>
<input type="password" id="editPassword">
<button type="button" class="btnShowPass" onclick="togglePassword()">Show</button><br><br>
<button class="btnSave" onclick="saveForm()">Simpan</button>
<button class="btnClose" onclick="closeModal()">Tutup</button>
</div>
</div>


<script>

const WEB_APP_URL="https://script.google.com/macros/s/AKfycbx80QYQRBuiZsZEaZWia3thQqggN2D1mOeL9WR9OK5qK4tCw-SpINFVhaC5iFGdOK2Fig/exec";

let dataPegawai=[];
let filtered=[];
let page=1;
let perPage=25;
let isAdd=false;



async function loadData(){

const res=await fetch(WEB_APP_URL+"?action=getPegawai");
dataPegawai=await res.json();

filtered=[...dataPegawai];

renderTable();

}



function renderTable(){

const search=document.getElementById("search").value.toLowerCase();

filtered=dataPegawai.filter(p=>
p.nama.toLowerCase().includes(search)
);

const start=(page-1)*perPage;
const end=start+perPage;

const rows=filtered.slice(start,end);

const tbody=document.getElementById("tbody");

tbody.innerHTML="";

rows.forEach((p,i)=>{

tbody.innerHTML+=`

<tr>

<td>${start+i+1}</td>
<td>${p.id}</td>
<td class="text-left">${p.nama}</td>
<td>${p.bagian}</td>

<td>
<button class="btnEdit" onclick="openEditModal(${p.row},'${p.id}','${p.nama}','${p.bagian}','${p.password}')">Edit</button>
<button class="btnDelete" onclick="hapus(${p.row})">Hapus</button>
</td>

</tr>

`;

});

renderPagination(filtered.length);

}



function renderPagination(total){

let pages=Math.ceil(total/perPage);

let html="";

for(let i=1;i<=pages;i++){

html+=`<button onclick="gotoPage(${i})">${i}</button>`;

}

document.getElementById("pagination").innerHTML=html;

}



function gotoPage(p){

page=p;

renderTable();

}



function openEditModal(row,nik,nama,bagian,password){

isAdd=false;

document.getElementById("modalTitle").innerText="Edit Pegawai";

document.getElementById("row").value=row;

document.getElementById("editNik").value=nik;

document.getElementById("editNama").value=nama;

document.getElementById("editBagian").value=bagian;

document.getElementById("editPassword").value=password;

document.getElementById("modalForm").style.display="block";

}



function openAddModal(){

isAdd=true;

document.getElementById("modalTitle").innerText="Tambah Pegawai";

document.getElementById("row").value="";

document.getElementById("editNik").value="";

document.getElementById("editNama").value="";

document.getElementById("editBagian").value="";

document.getElementById("editPassword").value="";

document.getElementById("modalForm").style.display="block";

}



function closeModal(){

document.getElementById("modalForm").style.display="none";

}



function togglePassword(){

let pass=document.getElementById("editPassword");

pass.type=pass.type==="password"?"text":"password";

}



async function saveForm(){

let row=document.getElementById("row").value;

let nik=document.getElementById("editNik").value.trim();

let nama=document.getElementById("editNama").value.trim();

let bagian=document.getElementById("editBagian").value.trim();

let password=document.getElementById("editPassword").value.trim();



if(!nik||!nama){

alert("NIK dan Nama harus diisi!");

return;

}



let duplikat=dataPegawai.some(p=>p.id==nik && p.row!=row);

if(duplikat){

alert("NIK sudah ada!");

return;

}



if(isAdd){

await fetch(`${WEB_APP_URL}?action=tambahPegawai&nik=${encodeURIComponent(nik)}&nama=${encodeURIComponent(nama)}&bagian=${encodeURIComponent(bagian)}&password=${encodeURIComponent(password)}`);

}

else{

await fetch(`${WEB_APP_URL}?action=updatePegawai&row=${row}&nik=${encodeURIComponent(nik)}&nama=${encodeURIComponent(nama)}&bagian=${encodeURIComponent(bagian)}&password=${encodeURIComponent(password)}`);

}



closeModal();

loadData();

}



async function hapus(row){

if(confirm("Hapus pegawai ini?")){

await fetch(`${WEB_APP_URL}?action=hapusPegawai&row=${row}`);

loadData();

}

}



loadData();



</script>
</body>
</html>
