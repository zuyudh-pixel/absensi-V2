<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Laporan Perkuliahan Harian</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#0ea5a4;
  --accent:#22d3ee;
  --success:#10b981;
  --warning:#facc15;
  --danger:#ef4444;
  --orange:#fb923c;
  --glass:rgba(255,255,255,0.08);
  --glass-border:rgba(255,255,255,0.18);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:'Poppins',sans-serif;
  background:
    radial-gradient(circle at 15% 20%, rgba(34,211,238,.25), transparent 40%),
    radial-gradient(circle at 85% 80%, rgba(16,185,129,.25), transparent 40%),
    linear-gradient(135deg,#0f172a,#0b1120 60%,#0a0f1c);
  min-height:100vh;
  padding:40px 20px;
  color:white;
}

.container{
  max-width:1200px;
  margin:auto;
}

.card{
  background:var(--glass);
  backdrop-filter:blur(30px);
  border:1px solid var(--glass-border);
  border-radius:28px;
  padding:32px;
  box-shadow:0 30px 80px rgba(0,0,0,.6);
}

/* HEADER */
.header-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  margin-bottom:25px;
  gap:20px;
}

.header-left{
  display:flex;
  align-items:center;
  gap:15px;
}

.header-left img{
  width:75px;
}

.header-text h2{
  font-size:12px;
  opacity:.7;
}

.header-text h3{
  font-size:18px;
  font-weight:600;
  background:linear-gradient(90deg,#22d3ee,#10b981);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* INPUT */
input[type="date"]{
  padding:12px 16px;
  border-radius:14px;
  background:rgba(255,255,255,0.06);
  color:white;
  border:1px solid rgba(255,255,255,.15);
}

button{
  padding:12px 20px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  background:linear-gradient(135deg,#0ea5a4,#22d3ee);
  color:white;
}

button:hover{
  transform:translateY(-2px);
}

/* JUDUL */
.judul-harian{
  text-align:center;
  font-size:22px;
  font-weight:600;
  margin:16px 0;
}

/* TABLE */
.table-container{
  border-radius:20px;
  overflow:auto;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,.1);
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  padding:14px;
  background:rgba(255,255,255,0.07);
  color:#22d3ee;
}

td{
  padding:12px;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,.08);
}

th:nth-child(2),
td:nth-child(2){
  text-align:left;
  padding-left:22px;
}

/* STATUS */
.wfo td:nth-child(3){
  color:var(--success);
  font-weight:600;
}

.wfa td:nth-child(3){
  color:var(--warning);
  font-weight:600;
}

.ijin td:nth-child(3){
  color:var(--orange);
  font-weight:600;
}

/* PDF */
.pdf-container{
  margin-top:30px;
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:20px;
}

.pdf-title{
  text-align:center;
  margin-bottom:12px;
}

.pdf-frame{
  width:100%;
  height:70vh;
  border:none;
}

.back-link{
  margin:16px 0;
}

.back-link a{
  color:#eaf869;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<div class="header-row">

<div class="header-left">
<img src="logo.png">
<div class="header-text">
<h2>UIN KIAI AGENG MUHAMMAD BESARI PONOROGO</h2>
<h3>PASCASARJANA</h3>
</div>
</div>

<div>
<input type="date" id="filterTanggal">
<button onclick="loadData()">Tampilkan Data</button>
</div>

</div>

<div class="back-link">
<a href="javascript:history.back()">← Kembali</a>
</div>

<div id="judulHarian" class="judul-harian"></div>

<div class="table-container" id="hasil"></div>

<div class="pdf-container">
<div class="pdf-title">Jadwal Kuliah Semester Genap 2025/2026</div>
<iframe class="pdf-frame" src="jadkul.pdf"></iframe>
</div>

<div class="back-link">
<a href="javascript:history.back()">← Kembali</a>
</div>

</div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycby06l_Y1P6UYrq0DXnewt-tZRESaeSEKBE18z7H4MMwkU_q31vNGhYhkNVDnI6dSYNu3w/exec";

function getLocalDateISO(){

  const now = new Date();
  const jakarta = new Date(
    now.toLocaleString("en-US",{timeZone:"Asia/Jakarta"})
  );

  const year = jakarta.getFullYear();
  const month = String(jakarta.getMonth()+1).padStart(2,"0");
  const day = String(jakarta.getDate()).padStart(2,"0");

  return `${year}-${month}-${day}`;
}

document.getElementById("filterTanggal").value = getLocalDateISO();

function formatIndonesia(dateObj){

  const hari=["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
  const bulan=["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];

  return hari[dateObj.getDay()] + ", " +
         dateObj.getDate() + " " +
         bulan[dateObj.getMonth()] + " " +
         dateObj.getFullYear();
}

function loadData(){

  const tanggal=document.getElementById("filterTanggal").value;

  document.getElementById("hasil").innerHTML="Memuat data...";

  fetch(`${API}?action=laporanharian&sheet=absensi&tanggal=${tanggal}`)
  .then(res=>res.json())
  .then(res=>{

    if(!res || res.status!=="success"){
      document.getElementById("hasil").innerHTML="Tidak ada data";
      return;
    }

    tampilkan(res.data,tanggal);

  })
  .catch(()=>{
    document.getElementById("hasil").innerHTML="Gagal mengambil data";
  });

}

function tampilkan(data,tanggalFilter){

  const dateObj=new Date(tanggalFilter);

  document.getElementById("judulHarian").innerText=
  "Perkuliahan "+formatIndonesia(dateObj);

  let html=`<table>
  <tr>
    <th>No</th>
    <th>Nama Dosen</th>
    <th>Model Kuliah</th>
    <th>Kelas</th>
    <th>Konfirmasi</th>
  </tr>`;

  let no=1;

  data.forEach(row=>{

    const timestamp=new Date(row.timestamp);

    const jam=timestamp.toLocaleTimeString("id-ID",{
      hour:"2-digit",
      minute:"2-digit",
      second:"2-digit",
      hour12:false
    });

    /* =========================
       AMBIL STATUS DARI DATA
    ========================= */

    const absensi=(row.absensi || row.Absensi || "").toLowerCase().trim();
    const workfrom=(row.workfrom || row.WorkFrom || "").toLowerCase().trim();

    let jenisKuliah="-";
    let kelasClass="";

    if(absensi==="ijin" || absensi==="izin"){
      jenisKuliah="Ijin";
      kelasClass="ijin";
    }
    else if(workfrom==="wfo"){
      jenisKuliah="Luring";
      kelasClass="wfo";
    }
    else if(workfrom==="wfa"){
      jenisKuliah="Daring";
      kelasClass="wfa";
    }

    html+=`<tr class="${kelasClass}">
      <td>${no++}</td>
      <td>${row.nama || "-"}</td>
      <td>${jenisKuliah}</td>
      <td>${row.kegiatan || "-"}</td>
      <td>${jam}</td>
    </tr>`;

  });

  html+="</table>";

  document.getElementById("hasil").innerHTML=html;

}

window.onload=function(){

  document.getElementById("filterTanggal").value=getLocalDateISO();

  loadData();

  setInterval(loadData,60000);

};

</script>

</body>
</html>
