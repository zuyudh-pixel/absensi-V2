<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Ijin Pegawai</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
.modal-content { border-radius:15px; border:none; box-shadow:0 15px 35px rgba(0,0,0,0.2); }
.modal-header { background-color:#f8f9fa; border-bottom:1px solid #eee; border-radius:15px 15px 0 0; }
.btn-submit-ijin { background-color:#0f172a; color:white; border:none; font-weight:600; padding:12px; transition:.3s; border-radius:10px; }
.btn-submit-ijin:hover { background-color:#22d3ee; color:#000; }
#loaderIjin { display:none; }
.alert { border-radius:10px; font-size:.9rem; }
</style>
</head>
<body>

<!-- Modal Ijin -->
<div class="modal fade" id="modalIjin" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-bold text-primary">Form Input Ijin</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <form id="formIjin">
          <div class="mb-3">
            <label class="form-label small fw-bold text-dark">ID Pegawai</label>
            <input type="text" class="form-control shadow-sm" id="idIjin" placeholder="Masukkan ID" required>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold text-dark">Password</label>
            <input type="password" class="form-control shadow-sm" id="passwordIjin" placeholder="Masukkan Password" required>
          </div>
          <button type="submit" id="btnSubmitIjin" class="btn-submit-ijin w-100 mt-2">Simpan Data Ijin</button>
        </form>

        <div id="loaderIjin" class="text-center mt-3">
          <div class="spinner-border spinner-border-sm text-primary"></div>
          <span class="ms-2 small text-muted">Memproses validasi...</span>
        </div>

        <div id="messageAreaIjin" class="mt-3 text-center"></div>
      </div>
    </div>
  </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxNcMF7Y07PK7a-zJaqvc4_KitEUxusqop-PJhRL1t0vUHcB0PsnLcEJbSS_M_gDmaK6Q/exec"; // Ganti dengan URL Web App

function openIjinModal(){
  document.getElementById('formIjin').reset();
  document.getElementById('messageAreaIjin').innerHTML = '';
  new bootstrap.Modal(document.getElementById('modalIjin')).show();
}

document.getElementById('formIjin').addEventListener('submit', function(e){
  e.preventDefault();
  const btn = document.getElementById('btnSubmitIjin');
  const loader = document.getElementById('loaderIjin');
  const msg = document.getElementById('messageAreaIjin');

  btn.disabled = true;
  loader.style.display = 'block';
  msg.innerHTML = '';

  const payload = new URLSearchParams();
  payload.append('action','ijin');
  payload.append('id',document.getElementById('idIjin').value);
  payload.append('password',document.getElementById('passwordIjin').value);

  fetch(WEB_APP_URL,{method:'POST', body: payload})
    .then(res => res.json())
    .then(result => {
      loader.style.display='none';
      btn.disabled=false;
      if(result.status === 'success'){
        msg.innerHTML=`<div class="alert alert-success border-0 shadow-sm"><strong>Berhasil!</strong><br>${result.message}</div>`;
        document.getElementById('formIjin').reset();
        setTimeout(()=>{bootstrap.Modal.getInstance(document.getElementById('modalIjin')).hide();},2500);
      } else if(result.status === 'duplicate'){
        msg.innerHTML=`<div class="alert alert-warning border-0 shadow-sm"><strong>Gagal!</strong><br>${result.message}</div>`;
      } else {
        msg.innerHTML=`<div class="alert alert-danger border-0 shadow-sm"><strong>Kesalahan:</strong><br>${result.message}</div>`;
      }
    })
    .catch(err => {
      loader.style.display='none';
      btn.disabled=false;
      msg.innerHTML=`<div class="alert alert-warning border-0 shadow-sm">Koneksi gagal. Coba lagi.</div>`;
    });
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
