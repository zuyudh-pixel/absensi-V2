<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Laporan Perkuliahan Harian</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin:0; padding:0; }

body {
  font-family:'Poppins',sans-serif;
  background: linear-gradient(135deg,#1a1f3a,#385694);
  color: #fff;
  padding: 30px;
}

.container { max-width: 1100px; margin: auto; }

.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(30px);
  border-radius: 22px;
  padding: 20px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.1);
}

h2 { text-align: center; font-weight: 400; margin-bottom: 0px; font-size: 14px; }
h3 { text-align: center; font-weight: 700; margin-bottom: 16px; font-size: 18px; text-shadow: 0 0 4px #fffffff8; }

input, button {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 14px;
  border: none;
  font-size: 15px;
}

input {
  background:#2c3b72;
  color:#fff;
  border:1px solid #3a4f7c;
}
input:focus {
  outline:none;
  border:1px solid #CCFF00;
  box-shadow: 0 0 10px rgba(255,215,0,0.4);
}

button {
  background: linear-gradient(90deg,#385694,#2b3a70);
  font-weight:700;
  color:#ffffff;
  cursor:pointer;
  transition: all 0.3s ease;
  box-shadow: 0 5px 20px rgba(0,0,0,0.5);
}
button:hover { transform: translateY(-3px); }

.judul-harian {
  text-align: center;
  margin-top: 20px;
  margin-bottom: 10px;
  font-weight: 600;
  font-size: 20px;
  color:#CCFF00;
  text-shadow: 0 0 4px #7FFF00;
}

.table-container {
  max-height: 520px;
  overflow: auto;
  margin-top: 20px;
  border-radius: 18px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.45);
}

table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 14px;
  min-width: 750px;
}

th, td { padding: 8px 6px; text-align: left; }
th {
  background: rgba(56,86,148,0.95);
  color: #CCFF00;
  font-weight: 700;
  position: sticky;
  top: 0;
}

tr:nth-child(odd) { background: rgba(56,86,148,0.08); }
tr:nth-child(even) { background: rgba(56,86,148,0.12); }

.wfo td:nth-child(3) { color: #CCFF00; font-weight: 700; }
.wfa td:nth-child(3) { color: #FFB74D; font-weight: 700; }

/* PDF Drive Preview */
.pdf-container {
  margin-top: 40px;
  background: rgba(255,255,255,0.05);
  border-radius: 18px;
  padding: 4px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.pdf-title {
  text-align: center;
  color: #CCFF00;
  font-weight: 600;
  margin-bottom: 20px;
  font-size: 18px;
}

.pdf-frame {
  width: 100%;
  height: 80vh;
  border: none;
  border-radius: 14px;
}

@media(max-width:768px){
  body { padding: 15px; }
  .pdf-frame { height: 60vh; }
}
</style>
</head>

<body>
<div class="container">
<div class="card">

<div style="text-align:center;margin-bottom:10px;">
<img src="https://raw.githubusercontent.com/zuyudh-pixel/absensi-V2/main/logo.png" style="width:80px;">
<h2>UIN KIAI AGENG MUHAMMAD BESARI PONOROGO</h2>
<h3>PASCASARJANA</h3>

<label>Pilih Tanggal</label>
<input type="date" id="filterTanggal">
<button onclick="loadData()">Tampilkan Data</button>

<div id="judulHarian" class="judul-harian"></div>
<div class="table-container" id="hasil"></div>

<!-- PDF preview di bawah tabel -->
<div class="pdf-container">
  <div class="pdf-title">
    Jadwal Kuliah Semester Genap 2025/2026
  </div>
  <iframe 
    class="pdf-frame"
    src="https://drive.google.com/file/d/1nB0jzNliRQLStIeTaO3JwjMBE6P5PxHJ/preview">
  </iframe>
</div>

</div>
</div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbz7DlCzKWkXLlchOGij2gVkDbuwpBqobQ2t9cleK5V_8XZ9wsfTzyXeo9LaGi89LtYZqg/exec";

function getLocalDateISO() {
  const now = new Date();

  // ambil tanggal berdasarkan timezone Asia/Jakarta
  const jakarta = new Date(
    now.toLocaleString("en-US", { timeZone: "Asia/Jakarta" })
  );

  const year = jakarta.getFullYear();
  const month = String(jakarta.getMonth() + 1).padStart(2, "0");
  const day = String(jakarta.getDate()).padStart(2, "0");

  return `${year}-${month}-${day}`;
}

document.getElementById("filterTanggal").value = getLocalDateISO();

function formatIndonesia(dateObj){
  const hari = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
  const bulan = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
  return hari[dateObj.getDay()] + ", " +
         dateObj.getDate() + " " +
         bulan[dateObj.getMonth()] + " " +
         dateObj.getFullYear();
}

function loadData(){
  const tanggal = document.getElementById("filterTanggal").value;
  document.getElementById("hasil").innerHTML = "Update data per 60 detik...";

  fetch(`${API}?action=laporanharian&sheet=absensi&tanggal=${tanggal}`)
    .then(res => res.json())
    .then(res => {
      if(!res || res.status !== "success" || !res.data){
        document.getElementById("hasil").innerHTML = "Tidak ada data";
        return;
      }
      tampilkan(res.data, tanggal);
    })
    .catch(() => {
      document.getElementById("hasil").innerHTML = "Gagal mengambil data";
    });
}

function tampilkan(data, tanggalFilter){
  const dateObj = new Date(
  new Date(tanggalFilter + "T00:00:00")
    .toLocaleString("en-US", { timeZone: "Asia/Jakarta" })
);
  document.getElementById("judulHarian").innerText =
    "Perkuliahan " + formatIndonesia(dateObj);

  let html = `<table>
    <tr>
      <th>No</th>
      <th>Nama Dosen</th>
      <th>Model Kuliah</th>
      <th>Kelas</th>
      <th>Konfirmasi</th>
    </tr>`;

  let no = 1;
  data.forEach(row => {
    const timestamp = new Date(row.timestamp || row.Tanggal);
    const jam = timestamp.toLocaleTimeString("id-ID",{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});

    let jenisKuliah = "-";
    let kelasClass = "";

    if(row.workfrom === "WFO") { jenisKuliah = "Luring"; kelasClass="wfo"; }
    else if(row.workfrom === "WFA") { jenisKuliah = "Daring"; kelasClass="wfa"; }

    html += `<tr class="${kelasClass}">
      <td>${no++}</td>
      <td>${row.nama || "-"}</td>
      <td>${jenisKuliah}</td>
      <td>${row.kegiatan || "-"}</td>
      <td>${jam}</td>
    </tr>`;
  });

  html += "</table>";
  document.getElementById("hasil").innerHTML = html;
}

window.onload = () => {
  loadData();
  setInterval(loadData, 60000); // refresh tabel setiap 60 detik
};
</script>

</body>
</html>
