<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Laporan Perkuliahan Harian</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(90deg,#0f3d3e 0%, #0b1f3a 100%);
  min-height:100vh;
  padding:40px 20px;
  color:#fff;
}

/* CONTAINER */
.container{
  max-width:1100px;
  margin:auto;
}

/* GLASS CARD */
.card{
  background:linear-gradient(145deg,
              rgba(255,255,255,0.15),
              rgba(255,255,255,0.06));
  backdrop-filter:blur(40px);
  -webkit-backdrop-filter:blur(40px);
  border-radius:30px;

  /* padding dibuat lebih kecil */
  padding:28px 28px 30px 28px;

  border:1px solid rgba(255,255,255,0.18);
  box-shadow:
      0 0 60px rgba(16,185,129,0.25),
      0 40px 80px rgba(0,0,0,0.6);
}

/* HEADER */
.card img{
  width:85px;
  margin-bottom:8px;
}

h2{
  text-align:center;
  font-size:13px;
  font-weight:400;
  letter-spacing:1px;
  opacity:.85;
}

h3{
  text-align:center;
  font-size:18px;
  font-weight:700;
  margin-bottom:18px;
  color:#facc15;
}

/* FILTER */
.filter-label{
  font-size:14px;
  margin-bottom:6px;
  opacity:.9;
}

.filter-row{
  display:flex;
  gap:14px;
  margin-bottom:18px;
}

.filter-row input{
  flex:1;
  padding:14px 18px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,0.25);
  background:rgba(255,255,255,0.08);
  color:#fff;
  font-size:14px;
  transition:.3s;
}

.filter-row input:focus{
  outline:none;
  border-color:#34d399;
  box-shadow:0 0 15px rgba(52,211,153,.5);
}

.filter-row button{
  padding:14px 28px;
  border-radius:20px;
  border:none;
  font-weight:600;
  cursor:pointer;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:#fff;
  box-shadow:0 10px 30px rgba(34,197,94,.4);
  transition:.3s;
}

.filter-row button:hover{
  transform:translateY(-3px);
}

/* JUDUL HARIAN */
.judul-harian{
  text-align:center;
  font-size:20px;
  font-weight:600;
  margin-bottom:14px;
  color:#facc15;
}

/* TABLE CONTAINER */
.table-container{
  margin-top:10px;
  border-radius:18px;
  overflow:auto;
  background:rgba(255,255,255,0.035);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.08);
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  min-width:750px;
  font-size:14px;
}

th{
  background:rgba(255,255,255,0.08);
  padding:12px 16px;
  text-align:center;
  color:#facc15;
  font-weight:600;
}

td{
  padding:11px 16px;
  border-bottom:1px solid rgba(255,255,255,0.06);
  text-align:center;
}

/* Nama dosen rata kiri */
td:nth-child(2){
  text-align:left;
  font-weight:500;
}

tr:nth-child(even){
  background:rgba(255,255,255,0.025);
}

/* WARNA MODEL */
.wfo td:nth-child(3){
  color:#34d399;
  font-weight:600;
}

.wfa td:nth-child(3){
  color:#f59e0b;
  font-weight:600;
}

/* PDF SECTION */
.pdf-container{
  margin-top:22px;
  background:rgba(255,255,255,0.04);
  border-radius:20px;
  padding:14px;
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.08);
}

.pdf-title{
  text-align:center;
  font-size:18px;
  margin-bottom:14px;
  font-weight:600;
  color:#facc15;
}

.pdf-frame{
  width:100%;
  height:80vh;
  border:none;
  border-radius:16px;
}

/* RESPONSIVE */
@media(max-width:768px){

  .card{
    padding:20px;
  }

  /* Input & tombol tetap sejajar */
  .filter-row{
    display:flex;
    flex-direction:row;   /* paksa tetap horizontal */
    gap:10px;
  }

  .filter-row input{
    flex:1;
    min-width:0;          /* penting supaya tidak overflow */
    padding:12px 14px;
    font-size:13px;
  }

  .filter-row button{
    padding:12px 16px;
    font-size:13px;
    white-space:nowrap;   /* teks tidak turun */
  }

  .pdf-frame{
    height:60vh;
  }
}

/* HEADER FLEX */
.header-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.header-left{
  display:flex;
  align-items:center;
  gap:15px;
}

.header-left img{
  width:80px;
}

.header-text{
  display:flex;
  flex-direction:column;
}

.header-text h2{
  text-align:left;
  font-size:14px;
  font-weight:500;
  letter-spacing:1px;
  opacity:.9;
}

.header-text h3{
  text-align:left;
  font-size:16px;
  font-weight:700;
  margin-top:4px;
  color:#facc15;
}

.header-right{
  display:flex;
  flex-direction:column;
  // align-items:flex-start;   /* ubah jadi rata kiri */
  margin-left:auto;   /* ini yang bikin blok kanan tetap di sisi kanan */
}

.header-right .filter-label{
  margin-bottom:6px;
  font-size:14px;
  opacity:.9;
}


.header-right .filter-row{
  margin:0;
}

@media(max-width:768px){

  /* Header jadi vertikal */
  .header-row{
    flex-direction:column;
    align-items:flex-start;
  }

  /* Blok kanan pindah ke kiri saat mobile */
  .header-right{
    margin-left:0;
    width:100%;
    align-items:flex-start;
  }

  /* Supaya label & input benar-benar rata kiri */
  .header-right .filter-label{
    text-align:left;
  }

  /* Input & tombol tetap sejajar */
  .filter-row{
    width:100%;
  }

}
</style>
</head>

<body>
<div class="container">
<div class="card">

<div class="header-row">

  <!-- KIRI -->
  <div class="header-left">
    <img src="https://raw.githubusercontent.com/zuyudh-pixel/absensi-V2/main/logo.png">
    <div class="header-text">
      <h2>UIN KIAI AGENG MUHAMMAD BESARI PONOROGO</h2>
      <h3>PASCASARJANA</h3>
    </div>
  </div>

  <!-- KANAN -->
  <div class="header-right">
  <label class="filter-label">Pilih Tanggal</label>
  <div class="filter-row">
    <input type="date" id="filterTanggal">
    <button onclick="loadData()">Tampilkan Data</button>
  </div>
</div>

</div>

<div id="judulHarian" class="judul-harian"></div>
<div class="table-container" id="hasil"></div>

<!-- PDF preview di bawah tabel -->
<div class="pdf-container">
  <div class="pdf-title">
    Jadwal Kuliah Semester Genap 2025/2026
  </div>
  <iframe 
    class="pdf-frame"
    src="https://drive.google.com/file/d/1nB0jzNliRQLStIeTaO3JwjMBE6P5PxHJ/preview">
  </iframe>
</div>

</div>
</div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbz7DlCzKWkXLlchOGij2gVkDbuwpBqobQ2t9cleK5V_8XZ9wsfTzyXeo9LaGi89LtYZqg/exec";

function getLocalDateISO() {
  const now = new Date();

  // ambil tanggal berdasarkan timezone Asia/Jakarta
  const jakarta = new Date(
    now.toLocaleString("en-US", { timeZone: "Asia/Jakarta" })
  );

  const year = jakarta.getFullYear();
  const month = String(jakarta.getMonth() + 1).padStart(2, "0");
  const day = String(jakarta.getDate()).padStart(2, "0");

  return `${year}-${month}-${day}`;
}

document.getElementById("filterTanggal").value = getLocalDateISO();

function formatIndonesia(dateObj){
  const hari = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
  const bulan = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
  return hari[dateObj.getDay()] + ", " +
         dateObj.getDate() + " " +
         bulan[dateObj.getMonth()] + " " +
         dateObj.getFullYear();
}

function loadData(){
  const tanggal = document.getElementById("filterTanggal").value;
  document.getElementById("hasil").innerHTML = "Update data per 60 detik...";

  fetch(`${API}?action=laporanharian&sheet=absensi&tanggal=${tanggal}`)
    .then(res => res.json())
    .then(res => {
      if(!res || res.status !== "success" || !res.data){
        document.getElementById("hasil").innerHTML = "Tidak ada data";
        return;
      }
      tampilkan(res.data, tanggal);
    })
    .catch(() => {
      document.getElementById("hasil").innerHTML = "Gagal mengambil data";
    });
}

function tampilkan(data, tanggalFilter){
  const dateObj = new Date(
  new Date(tanggalFilter + "T00:00:00")
    .toLocaleString("en-US", { timeZone: "Asia/Jakarta" })
);
  document.getElementById("judulHarian").innerText =
    "Perkuliahan " + formatIndonesia(dateObj);

  let html = `<table>
    <tr>
      <th>No</th>
      <th>Nama Dosen</th>
      <th>Model Kuliah</th>
      <th>Kelas</th>
      <th>Konfirmasi</th>
    </tr>`;

  let no = 1;
  data.forEach(row => {
    const timestamp = new Date(row.timestamp || row.Tanggal);
    const jam = timestamp.toLocaleTimeString("id-ID",{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});

    let jenisKuliah = "-";
    let kelasClass = "";

    if(row.workfrom === "WFO") { jenisKuliah = "Luring"; kelasClass="wfo"; }
    else if(row.workfrom === "WFA") { jenisKuliah = "Daring"; kelasClass="wfa"; }

    html += `<tr class="${kelasClass}">
      <td>${no++}</td>
      <td>${row.nama || "-"}</td>
      <td>${jenisKuliah}</td>
      <td>${row.kegiatan || "-"}</td>
      <td>${jam}</td>
    </tr>`;
  });

  html += "</table>";
  document.getElementById("hasil").innerHTML = html;
}

// ================= FULLSCREEN =================
function requestFullscreen(){
  const el=document.documentElement;
  if(el.requestFullscreen) el.requestFullscreen();
}
document.addEventListener("click", requestFullscreen, {once:true});


window.onload = () => {
  loadData();
  setInterval(loadData, 60000); // refresh tabel setiap 60 detik
};

// ===============================
// ANTI INSPECT SUPER AGRESIF
// ===============================

// Blokir klik kanan
document.addEventListener("contextmenu", e => e.preventDefault());

// Blokir shortcut developer tools
document.addEventListener("keydown", function(e){

  // F12
  if (e.key === "F12") e.preventDefault();

  // Ctrl+Shift+I/J/C
  if (e.ctrlKey && e.shiftKey && 
     (e.key === "I" || e.key === "J" || e.key === "C")) {
    e.preventDefault();
  }

  // Ctrl+U
  if (e.ctrlKey && e.key === "u") {
    e.preventDefault();
  }

  // Ctrl+S
  if (e.ctrlKey && e.key === "s") {
    e.preventDefault();
  }

});
</script>

</body>
</html>
