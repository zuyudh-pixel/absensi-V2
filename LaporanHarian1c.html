<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Laporan Perkuliahan Harian</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin:0; padding:0; }

body {
  font-family:'Poppins',sans-serif;
  background: linear-gradient(135deg,#1a1f3a,#385694);
  color: #fff;
  padding: 30px;
}

.container { max-width: 1100px; margin: auto; }

.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(30px);
  border-radius: 22px;
  padding-top: 35px;
  padding: 20px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.1);
  transition: all 0.3s ease;
}

.card:hover { box-shadow: 0 30px 70px rgba(56,86,148,0.6); }

h2 {
  text-align: center;
  font-weight: 400;
  margin-bottom: 8px;
  font-size: 16px;
  color: #ffffff;
}

h3 {
  text-align: center;
  font-weight: 700;
  margin-bottom: 25px;
  font-size: 18px;
  color: #ffffff;
}

input, button {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 14px;
  border: none;
  font-size: 15px;
}

input {
  background:#2c3b72;
  color:#fff;
  border:1px solid #3a4f7c;
}

input:focus {
  outline:none;
  border:1px solid #CCFF00;
  box-shadow: 0 0 10px rgba(255,215,0,0.4);
}

button {
  background: linear-gradient(90deg,#385694,#2b3a70);
  font-weight:700;
  color:#ffffff;
  cursor:pointer;
  transition: all 0.3s ease;
  box-shadow: 0 5px 20px rgba(0,0,0,0.5);
}

button:hover {
  transform: translateY(-3px);
  box-shadow:0 15px 35px rgba(0,0,0,0.7);
}

.judul-harian {
  text-align: center;
  margin-top: 20px;
  margin-bottom: 10px;
  font-weight: 600;
  font-size: 20px;
  color:#CCFF00;
  text-shadow: 0 0 8px rgba(255,215,0,0.6);
}

.table-container {
  max-height: 520px;
  overflow-y: auto;
  overflow-x: auto;
  margin-top: 20px;
  border-radius: 18px;

  /* Shadow Premium */
  box-shadow:
    0 15px 35px rgba(0,0,0,0.45),
    0 5px 15px rgba(56,86,148,0.4);

  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  transition: all 0.3s ease;
}

table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 14px;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 12px 35px rgba(0,0,0,0.25);
  min-width: 750px;
}

th, td { padding: 8px 6px; text-align: left; }

th {
  background: rgba(56,86,148,0.95);
  color: #CCFF00;
  font-weight: 700;
  position: sticky;
  top: 0;
  z-index: 2;
}

tr:nth-child(odd) {
  background: linear-gradient(90deg, rgba(56,86,148,0.08), rgba(56,86,148,0.12));
}

tr:nth-child(even) {
  background: linear-gradient(90deg, rgba(56,86,148,0.12), rgba(56,86,148,0.16));
}

tr:hover {
  background: linear-gradient(90deg, rgba(255,215,0,0.15), rgba(255,215,0,0.25));
}

.wfo td:nth-child(3) { color: #CCFF00; font-weight: 700; }
.wfa td:nth-child(3) { color: #FFB74D; font-weight: 700; }

/* ====== PDF Preview Style ====== */
.pdf-container {
  margin-top: 40px;
  background: rgba(255,255,255,0.05);
  border-radius: 18px;
  padding: 15px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.1);
}

.pdf-title {
  text-align: center;
  color: #CCFF00;
  font-weight: 600;
  margin-bottom: 15px;
}

iframe {
  width: 100%;
  height: 600px;
  border: none;
  border-radius: 12px;
}

@media(max-width:768px){
  body { padding: 15px; }
  th, td { padding: 12px 8px; font-size: 13px; }
  iframe { height: 400px; }
}
</style>
</head>

<body>
<div class="container">
<div class="card">

<div style="text-align:center;margin-bottom:10px;">
<img src="https://raw.githubusercontent.com/zuyudh-pixel/absensi-V2/main/logo.png" style="width:80px;">
<h2>UIN KIAI AGENG MUHAMMAD BESARI PONOROGO</h2>
<h3>PASCASARJANA</h3>

<label>Pilih Tanggal</label>
<input type="date" id="filterTanggal">
<button onclick="loadData()">Tampilkan Data</button>

<div id="judulHarian" class="judul-harian"></div>
<div class="table-container" id="hasil"></div>

<!-- ================= PDF PREVIEW ================= -->
<div class="pdf-container">
  <div class="pdf-title">
    Jadwal Perkuliahan Semester Genap 2025/2026
  </div>
  <iframe 
    src="https://drive.google.com/file/d/1nB0jzNliRQLStIeTaO3JwjMBE6P5PxHJ/preview"
    allow="autoplay">
  </iframe>
</div>
<!-- ============================================== -->

</div>
</div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbz7DlCzKWkXLlchOGij2gVkDbuwpBqobQ2t9cleK5V_8XZ9wsfTzyXeo9LaGi89LtYZqg/exec";

function getLocalDateISO() {
  const now = new Date();
  const year = now.getFullYear();
  const month = String(now.getMonth() + 1).padStart(2, '0');
  const day = String(now.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

document.getElementById("filterTanggal").value = getLocalDateISO();

function formatIndonesia(dateObj){
  const hari = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
  const bulan = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
  return hari[dateObj.getDay()] + ", " +
         dateObj.getDate() + " " +
         bulan[dateObj.getMonth()] + " " +
         dateObj.getFullYear();
}

function loadData(){
  const tanggal = document.getElementById("filterTanggal").value;
  if(!tanggal){
    alert("Pilih tanggal terlebih dahulu");
    return;
  }

  document.getElementById("hasil").innerHTML = "Memuat data...";

  fetch(`${API}?action=laporanharian&sheet=absensi&tanggal=${tanggal}`)
    .then(res => res.json())
    .then(res => {
      if(!res || res.status !== "success" || !res.data){
        document.getElementById("hasil").innerHTML = "Tidak ada data";
        return;
      }
      tampilkan(res.data, tanggal);
    })
    .catch(() => {
      document.getElementById("hasil").innerHTML = "Gagal mengambil data";
    });
}

function tampilkan(data, tanggalFilter){
  const dateObj = new Date(tanggalFilter + "T00:00:00");
  document.getElementById("judulHarian").innerText =
    "Perkuliahan " + formatIndonesia(dateObj);

  if(!data || data.length === 0){
    document.getElementById("hasil").innerHTML = "Tidak ada data";
    return;
  }

  let html = `<table>
    <tr>
      <th>No</th>
      <th>Nama Dosen</th>
      <th>Jenis Kuliah</th>
      <th>Kelas</th>
      <th>Konfirmasi</th>
    </tr>`;

  let no = 1;
  data.forEach(row => {
    const timestamp = new Date(row.timestamp || row.Tanggal);

    const jam = timestamp.toLocaleTimeString("id-ID", {
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit",
      hour12: false
    });

    let jenisKuliah = "-";
    let kelasClass = "";

    if(row.workfrom === "WFO") { jenisKuliah = "Luring"; kelasClass="wfo"; }
    else if(row.workfrom === "WFA") { jenisKuliah = "Daring"; kelasClass="wfa"; }

    html += `<tr class="${kelasClass}">
      <td>${no++}</td>
      <td>${row.nama || "-"}</td>
      <td>${jenisKuliah}</td>
      <td>${row.kegiatan || "-"}</td>
      <td>${jam}</td>
    </tr>`;
  });

  html += "</table>";
  document.getElementById("hasil").innerHTML = html;
}

window.onload = () => {
  loadData();
  setInterval(loadData, 60000);
};
</script>

</body>
</html>
