<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informasi Perkuliahan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/4adad1b75f.js" crossorigin="anonymous"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  display:flex;
  min-height:100vh;
  background:#e2e4e3;
  overflow-x:hidden;
}

/* ================= SIDEBAR ================= */
.sidebar{
  width:250px;
  padding:30px 18px;
  position:fixed;
  left:0;
  top:0;
  height:100%;
  transition:0.3s;
  color:white;
  z-index:2;

  background:
    radial-gradient(circle at 15% 20%, rgba(34,211,238,.25), transparent 40%),
    radial-gradient(circle at 85% 80%, rgba(16,185,129,.25), transparent 40%),
    linear-gradient(135deg,#0f172a,#0b1120 60%,#0a0f1c);
}

.sidebar.hidden{ left:-250px; }

.sidebar h2{
  font-size:13px;
  letter-spacing:2px;
  margin:50px 0 25px 10px;
}

.sidebar a{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 14px;
  border-radius:8px;
  color:white;
  text-decoration:none;
  margin-bottom:8px;
  font-size:14px;
  transition:.25s;
}

.sidebar a:hover{
  background:rgba(255,255,255,0.1);
}

.sidebar a.active{
  background:rgba(255,255,255,0.15);
  border-left:4px solid #22d3ee;
}

/* ================= TOGGLE ================= */
.toggle-btn{
  position:fixed;
  top:22px;
  left:250px;
  background:#22d3ee;
  border-radius:50%;
  width:34px;
  height:34px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  color:#000;
  font-weight:bold;
  z-index:999;
  transition:left .3s;
}

/* ================= MAIN ================= */
.main{
  flex:1;
  margin-left:250px;
  padding:35px 45px;
  transition:.3s;
}

.main.fullwidth{ margin-left:0; }

/* ================= HEADER ================= */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:22px 35px;
  border-radius:14px;
  color:white;
  margin-bottom:40px;
  box-shadow:0 10px 25px rgba(0,0,0,.25);

  background:
    radial-gradient(circle at 15% 20%, rgba(34,211,238,.25), transparent 40%),
    radial-gradient(circle at 85% 80%, rgba(16,185,129,.25), transparent 40%),
    linear-gradient(135deg,#0f172a,#0b1120 60%,#0a0f1c);
}

.header-left{
  display:flex;
  align-items:center;
  gap:10px;
}

.header-logo{ width:60px; }

.header-text h4{ font-size:14px; opacity:.9; }
.header-text h2{ font-size:16px; color:#22d3ee; }

.header-right h1{ font-size:22px; }
.header-right h2{ font-size:14px; opacity:.8; }

/* ================= HERO IMAGE ================= */
.hero-section{
  position:relative;
  width:100%;
  height:430px;
  background:url('bg-1.png') center/cover no-repeat;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,.25);
}

/* overlay */
.hero-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(255,255,255,0.2), rgba(255,255,255,0.9));
  display:flex;
  justify-content:center;
  align-items:flex-end;
  padding-bottom:70px; /* posisi 1/3 bawah */
}

/* menu di dalam gambar */
.hero-menu{
  display:flex;
  gap:25px;
  flex-wrap:wrap;
  justify-content:center;
}

/* tombol */
.hero-btn{
  background:white;
  padding:14px 28px;
  border-radius:50px;
  text-decoration:none;
  font-size:14px;
  font-weight:500;
  color:#0f172a;
  display:flex;
  align-items:center;
  gap:10px;
  box-shadow:0 12px 30px rgba(0,0,0,.2);
  transition:.3s;
}

.hero-btn:hover{
  transform:translateY(-5px);
  background:#0f172a;
  color:white;
}

.hero-btn:hover i{ color:#22d3ee; }

/* ================= RESPONSIVE ================= */
@media(max-width:900px){
  .sidebar{ left:-250px; }
  .toggle-btn{ left:10px; }
  .main{ margin-left:0; padding:25px; }

  .hero-section{ height:350px; }

  .hero-menu{
    flex-direction:column;
    gap:15px;
  }
}
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <h2>MENU</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="index.html">Absensi</a>
  <a href="LaporanHarian.html">Laporan Harian</a>
  <a href="LaporanBulanan.html">Laporan Bulanan</a>
  <a href="grafik_rekap_smt.html">Rekap Semester</a>
</div>

<div class="toggle-btn" onclick="toggleSidebar()" id="toggleIcon">&lt;</div>

<div class="main" id="main">

  <div class="header">
    <div class="header-left">
      <img src="logo.png" class="header-logo">
      <div class="header-text">
        <h4>UIN KIAI AGENG MUHAMMAD BESARI PONOROGO</h4>
        <h2>PASCASARJANA</h2>
      </div>
    </div>

    <div class="header-right">
      <h1>Monitoring Perkuliahan</h1>
      <h2 id="semesterTitle">Sedang memuat...</h2>
    </div>
  </div>

  <!-- HERO IMAGE -->
  <div class="hero-section">
    <div class="hero-overlay">
      <div class="hero-menu">

        <a href="index.html" class="hero-btn">
          <i class="fas fa-user-check"></i> Absensi
        </a>

        <a href="LaporanHarian.html" class="hero-btn">
          <i class="fas fa-calendar-day"></i> Laporan Harian
        </a>

        <a href="LaporanBulanan.html" class="hero-btn">
          <i class="fas fa-file-alt"></i> Laporan Bulanan
        </a>

        <a href="grafik_rekap_smt.html" class="hero-btn">
          <i class="fas fa-chart-bar"></i> Rekap Semester
        </a>

      </div>
    </div>
  </div>

</div>

<script>
function toggleSidebar(){
  const sidebar=document.getElementById("sidebar");
  const main=document.getElementById("main");
  const toggle=document.getElementById("toggleIcon");

  sidebar.classList.toggle("hidden");
  main.classList.toggle("fullwidth");
  toggle.innerHTML=sidebar.classList.contains("hidden")?"&gt;":"&lt;";
  toggle.style.left=sidebar.classList.contains("hidden")?"0px":"250px";
}
</script>

</body>
</html>
