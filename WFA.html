<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absensi Dosen</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

<style>
:root{
  --primary:#0ea5a4;
  --primary-soft:#2dd4bf;
  --accent:#22d3ee;
  --success:#10b981;
  --danger:#ef4444;
  --glass:rgba(255,255,255,0.08);
  --glass-border:rgba(255,255,255,0.18);
}

/* ================= BODY BACKGROUND 2026 ================= */
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:
    radial-gradient(circle at 15% 20%, rgba(34,211,238,.25), transparent 40%),
    radial-gradient(circle at 85% 80%, rgba(16,185,129,.25), transparent 40%),
    linear-gradient(135deg,#0f172a,#0b1120 60%,#0a0f1c);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
  color:white;
  overflow-x:hidden;
}

/* ================= CARD GLASS 2026 ================= */
.card{
  background:var(--glass);
  backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);
  border:1px solid var(--glass-border);
  padding:32px 26px;
  width:100%;
  max-width:440px;
  border-radius:28px;
  box-shadow:
      0 30px 80px rgba(0,0,0,.6),
      0 0 60px rgba(34,211,238,.15);
  transition:.4s ease;
  position:relative;
}

/* Glow border effect */
.card::before{
  content:"";
  position:absolute;
  inset:-1px;
  border-radius:28px;
  background:linear-gradient(135deg,rgba(34,211,238,.4),rgba(16,185,129,.4));
  opacity:.15;
  z-index:-1;
  filter:blur(20px);
}

/* Hover floating effect */
.card:hover{
  transform:translateY(-6px);
  box-shadow:
      0 40px 100px rgba(0,0,0,.7),
      0 0 80px rgba(34,211,238,.25);
}

/* ================= HEADER ================= */
.card img{
  filter:drop-shadow(0 0 15px rgba(34,211,238,.6));
}

.card div:first-child div:nth-child(2){
  font-size:11px;
  letter-spacing:.8px;
  opacity:.7;
}

.card div:first-child div:nth-child(3){
  font-size:14px;
  opacity:.85;
}

.card div:first-child div:nth-child(4){
  font-size:18px;
  font-weight:600;
  background:linear-gradient(90deg,#22d3ee,#10b981);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* ================= TIME ================= */
.time{
  text-align:center;
  font-size:14px;
  margin:10px 0 18px 0;
  color:#94a3b8;
  letter-spacing:.5px;
}

/* ================= BUTTONS ================= */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:18px;
  font-weight:500;
  cursor:pointer;
  margin-bottom:14px;
  transition:.3s ease;
  letter-spacing:.4px;
  font-size:14px;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 25px rgba(0,0,0,.4);
}

.btn-primary{
  background:linear-gradient(135deg,#0ea5a4,#22d3ee);
  color:white;
}

.btn-success{
  background:linear-gradient(135deg,#10b981,#34d399);
  color:white;
}

.btn-danger{
  background:linear-gradient(135deg,#ef4444,#f87171);
  color:white;
}

/* ================= VIDEO ================= */
#video{
  border-radius:20px;
  width:100%;
  max-width:290px;
  margin-bottom:14px;
  box-shadow:0 20px 40px rgba(0,0,0,.6);
}

/* ================= INPUT MODERN ================= */
select,
input[type="text"]{
  width:100%;
  padding:15px 16px;
  border-radius:18px;
  background:rgba(255,255,255,0.06);
  color:white;
  border:1px solid rgba(255,255,255,.15);
  margin-bottom:16px;
  font-size:14px;
  outline:none;
  transition:.3s;
  box-sizing:border-box;
}

select:focus,
input[type="text"]:focus{
  border:1px solid var(--primary-soft);
  box-shadow:0 0 0 3px rgba(34,211,238,.2);
  background:rgba(255,255,255,0.1);
}

/* ================= TOAST 2026 ================= */
.toast{
  position:fixed;
  top:30%;
  left:50%;
  transform:translate(-50%,-50%) scale(.95);
  width:90%;
  max-width:420px;
  background:rgba(15,23,42,.85);
  backdrop-filter:blur(20px);
  padding:22px;
  border-radius:20px;
  font-weight:500;
  text-align:center;
  color:white;
  border:1px solid rgba(34,211,238,.3);
  box-shadow:0 30px 70px rgba(0,0,0,.6);
  opacity:0;
  transition:.35s ease;
  z-index:9999;
}

.toast.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}

/* ================= SMOOTH ANIMATION ================= */
*{
  scroll-behavior:smooth;
}

</style>

</head>
<body>
<div class="card">
  <div style="text-align:center;margin-bottom:10px;">
    <img src="logo.png" style="width:80px;">
    <div style="font-size:10px;color:#a1a1aa;">UIN KIAI AGENG MUHAMMAD BESARI PONOROGO</div>
    <div style="font-size:14px;color:#cbd5e1;">PASCASARJANA</div>
    <div style="font-size:16px;color:#facc15;margin-top:5px;">ABSENSI DOSEN PENGAMPU</div>
  </div>

  <div class="time" id="timeNow"></div>

  <!-- LOGIN AREA -->
  <div id="loginArea">
    <div style="display:flex;flex-direction:column;align-items:center;">
      <video id="video" playsinline></video>
      <canvas id="canvas" style="display:none;"></canvas>
      <button class="btn-primary" id="btnScan">Scan Barcode</button>
      <input type="file" id="fileInput" accept="image/*" onchange="scanFile(this)">
    </div>
    <div style="text-align:center;margin-top:28px;">
      <span onclick="window.location.reload(true)" style="font-size:13px;color:#60a5fa;cursor:pointer;text-decoration:none;&#8635"> 🔄 Refresh</span>
      <span style="margin:0 8px;">|</span>
      <span onclick="logout()" style="font-size:13px;color:#60a5fa;cursor:pointer;text-decoration:none;&#8635"> 🚪 Keluar</span>

    </div>
    
  </div>

  <!-- ABSEN AREA -->
  <div id="absenArea" style="display:none;margin-top:15px;">
    <h4 id="userInfoAbsen" style="text-align:center;color:#facc15;"></h4>
    <label>Absensi</label>
    <select id="tipe">
      <option value="Masuk">Masuk</option>
      <option value="Pulang">Pulang</option>
    </select>

    <label>Lokasi Kerja</label>
    <select id="workfrom">
      <option value="WFO">Kampus (WFO)</option>
      <option value="WFA">WFA</option>
    </select>

    <label>Kelas (Saat Masuk)</label>
    <input type="text" id="kegiatan" placeholder="Contoh: 25.MHKI.A; 25.MPAI.B;...">

    <div style="display:flex;gap:8px;margin-top:12px;">
      <button class="btn-success" id="btnAbsen" onclick="absen()">📤 Kirim</button>
      <button class="btn-primary" onclick="bukaLaporan()">📑 Laporan</button>
      <button class="btn-danger" onclick="window.location.reload(true)">🔓 Logout</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxEOdxsRAj7KBJqvcXu9pEYjihvzeqtd9djLzhCFOrcq2Qmp24_qGzHhLtx7xupfaxCTg/exec";

let currentUser={}, userLat=null, userLng=null;
let videoStream=null, scanning=false;
let audioCtx=null;

const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

/* ================= JAM ================= */
setInterval(()=>{
  document.getElementById("timeNow").innerText =
    new Date().toLocaleDateString()+" - "+
    new Date().toLocaleTimeString();
},1000);

/* ================= TOAST ================= */
function showToast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.style.whiteSpace="pre-line"; // support \n
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),3000);
}

/* ================= AUDIO FIX MOBILE ================= */
function initAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if(audioCtx.state === "suspended"){
    audioCtx.resume();
  }
}

function playBeep(duration=150,frequency=1000,volume=0.7){
  if(!audioCtx) return;

  const oscillator = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();

  oscillator.type="sine";
  oscillator.frequency.value=frequency;

  gainNode.gain.setValueAtTime(volume,audioCtx.currentTime);

  oscillator.connect(gainNode);
  gainNode.connect(audioCtx.destination);

  oscillator.start();
  oscillator.stop(audioCtx.currentTime + duration/1000);
}

function doubleBeep(){
  playBeep(120,1200);
  setTimeout(()=>playBeep(120,900),150);
}

/* ================= GPS ================= */
function getLocation(){
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      userLat=pos.coords.latitude;
      userLng=pos.coords.longitude;
    });
  }
}

/* ================= SCANNER ================= */
document.getElementById("btnScan").addEventListener("click",()=>{
  initAudio(); // WAJIB agar beep aktif
  scanning?stopScanner():startScanner();
});

async function startScanner(){
  try{
    videoStream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:"environment"}}
    });
    video.srcObject=videoStream;
    await video.play();
    scanning=true;
    document.getElementById("btnScan").innerText="Stop Scan";
    scanLoop();
  }catch{
    showToast("Gagal akses kamera ❌");
  }
}

function scanLoop(){
  if(!scanning) return;

  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
  ctx.drawImage(video,0,0,canvas.width,canvas.height);

  const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
  const code=jsQR(imageData.data,imageData.width,imageData.height,{inversionAttempts:"dontInvert"});

  if(code){
    stopScanner();
    doubleBeep();
    showToast("Barcode terdeteksi ✅\nTunggu sampai login berhasil ⚠️");
    processBarcode(code.data);
    return;
  }

  requestAnimationFrame(scanLoop);
}

function stopScanner(){
  if(videoStream){
    videoStream.getTracks().forEach(t=>t.stop());
    videoStream=null;
  }
  scanning=false;
  video.srcObject=null;
  document.getElementById("btnScan").innerText="Scan Barcode";
}

/* ================= SCAN FILE ================= */
function scanFile(input){
  initAudio();
  if(!input.files.length) return;

  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      canvas.width=img.width;
      canvas.height=img.height;
      ctx.drawImage(img,0,0);

      const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
      const code=jsQR(imageData.data,imageData.width,imageData.height);

      if(code){
        doubleBeep();
        showToast("Barcode terdeteksi ✅\nTunggu sampai login berhasil ⚠️");
        processBarcode(code.data);
      }else{
        showToast("Barcode tidak terbaca ❌");
      }

      input.value="";
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(input.files[0]);
}

/* ================= LOGIN ================= */
function processBarcode(data){
  if(!data.includes("|")){
    showToast("Format barcode salah ❌");
    return;
  }
  loginWithBarcode(data);
}

async function loginWithBarcode(data){
  const [id,password]=data.split("|");
  const fd=new FormData();
  fd.append("action","login");
  fd.append("id",id);
  fd.append("password",password);

  try{
    const res=await fetch(WEB_APP_URL,{method:"POST",body:fd});
    const r=await res.json();

    if(r.status==="success"){
      currentUser={id,nama:r.nama};
      document.getElementById("loginArea").style.display="none";
      document.getElementById("absenArea").style.display="block";
      document.getElementById("userInfoAbsen").innerText=r.nama;
      showToast("Login berhasil ✅");
      getLocation();
    }else{
      showToast("Barcode tidak valid ❌");
    }
  }catch{
    showToast("Server error ❌");
  }
}

/* ================= LOGOUT ================= */
function logout(){
  currentUser={};
  userLat=null;
  userLng=null;

  document.getElementById("loginArea").style.display="block";
  document.getElementById("absenArea").style.display="none";
  document.getElementById("userInfoAbsen").innerText="";

  stopScanner();
}

/* ================= ABSEN ================= */
function getBulanIndo3(date){
  const bulan=["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"];
  return bulan[date.getMonth()];
}

async function absen(){
  if(!currentUser.id){
    showToast("Silakan login dulu ❗");
    return;
  }

  const now=new Date();
  const currentTime=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();
  const startTime=8*3600;
  const endTime=22*3600;

  if(currentTime<startTime || currentTime>endTime){
    showToast("Absensi hanya pukul 08.00-22.00 WIB ❗");
    return;
  }

  const tipe=document.getElementById("tipe").value;
  const workfrom=document.getElementById("workfrom").value;
  const kegiatan=document.getElementById("kegiatan").value.trim();

  if(tipe==="Masuk" && kegiatan===""){
    showToast("Kelas wajib diisi saat MASUK ❗");
    return;
  }

  if(!userLat){
    showToast("GPS belum aktif ❗");
    return;
  }

  const btn=document.getElementById("btnAbsen");
  btn.innerText="Memproses...";

  const key_rekap=currentUser.id+tipe+workfrom+getBulanIndo3(now);

  const fd=new FormData();
  fd.append("action","absen");
  fd.append("id",currentUser.id);
  fd.append("nama",currentUser.nama);
  fd.append("tipe",tipe);
  fd.append("workfrom",workfrom);
  fd.append("kegiatan",kegiatan);
  fd.append("latitude",userLat);
  fd.append("longitude",userLng);
  fd.append("key_rekap",key_rekap);

  try{
    const res=await fetch(WEB_APP_URL,{method:"POST",body:fd});
    const r=await res.json();

    if(r.status==="success") showToast("Absensi berhasil ✅");
    else if(r.status==="duplicate_masuk") showToast("Sudah absen MASUK ❗");
    else if(r.status==="no_masuk") showToast("Belum absen MASUK ❗");
    else if(r.status==="updated_pulang") showToast("PULANG berhasil diupdate ✅");
    else if(r.status==="out_of_radius") showToast("Di luar radius ❌");
    else showToast("Gagal absen ❌");

  }catch{
    showToast("Server error ❌");
  }

  btn.innerText="Kirim";
}


/* ================= BUKA LAPORAN ================= */
function bukaLaporan(){
  if(!currentUser.id){
    showToast("Silakan login dulu ❗");
    return;
  }

  const url = "laporanperdosen.html?id=" + encodeURIComponent(currentUser.id);

  // buka di tab baru
  window.open(url, "_blank");
}

// ANTI INSPECT SUPER AGRESIF
// ===============================

// Blokir klik kanan
document.addEventListener("contextmenu", e => e.preventDefault());

// Blokir shortcut developer tools
document.addEventListener("keydown", function(e){

  // F12
  if (e.key === "F12") e.preventDefault();

  // Ctrl+Shift+I/J/C
  if (e.ctrlKey && e.shiftKey && 
     (e.key === "I" || e.key === "J" || e.key === "C")) {
    e.preventDefault();
  }

  // Ctrl+U
  if (e.ctrlKey && e.key === "u") {
    e.preventDefault();
  }

  // Ctrl+S
  if (e.ctrlKey && e.key === "s") {
    e.preventDefault();
  }

});

function logout(){
  window.location.href = "dashboard.html";
}

</script>
</body>
</html>
