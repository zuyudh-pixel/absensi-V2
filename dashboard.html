<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Pascasarjana UIN Ponorogo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/4adad1b75f.js" crossorigin="anonymous"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  display:flex;
  min-height:100vh;
  background:#e2e4e3;
  overflow-x:hidden;
}

/* ================= SIDEBAR ================= */
.sidebar{
  width:250px;
  padding:30px 18px;
  position:fixed;
  left:0;
  top:0;
  height:100%;
  transition:0.3s;
  color:white;
  z-index:20;

  background:
    radial-gradient(circle at 15% 20%, rgba(34,211,238,.25), transparent 40%),
    radial-gradient(circle at 85% 80%, rgba(16,185,129,.25), transparent 40%),
    linear-gradient(135deg,#0f172a,#0b1120 60%,#0a0f1c);
}

.sidebar.hidden{ left:-250px; }

.sidebar h2{
  font-size:13px;
  letter-spacing:2px;
  margin:50px 0 25px 10px;
}

.sidebar a{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 14px;
  border-radius:8px;
  color:white;
  text-decoration:none;
  margin-bottom:8px;
  font-size:14px;
  transition:.25s;
}

.sidebar a:hover{ background:rgba(255,255,255,0.1); }

.sidebar a.active{
  background:rgba(255,255,255,0.15);
  border-left:4px solid #22d3ee;
}

/* ================= TOGGLE ================= */
.toggle-btn{
  position:fixed;
  top:22px;
  left:250px;
  background:#22d3ee;
  border-radius:50%;
  width:34px;
  height:34px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  color:#000;
  font-weight:bold;
  z-index:999;
  transition:left .3s;
}

/* ================= MAIN AREA ================= */
.main{
  flex:1;
  margin-left:250px;
  padding:35px 45px;
  transition:.3s;
  position: relative; 
}

.main.fullwidth{ margin-left:0; }

/* DEKORASI BACKGROUND SUDUT (DI BELAKANG) */
.bg-decoration-corner {
  position: absolute;
  top: 0;
  left: 0;
  width: 450px; 
  height: auto;
  opacity: 0.7;
  z-index: 0;
  pointer-events: none;
}

/* ================= HEADER ================= */
.header{
  position: relative;
  z-index: 5;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:22px 35px;
  border-radius:14px;
  color:white;
  margin-bottom:40px;
  box-shadow:0 10px 25px rgba(0,0,0,.25);

  background: linear-gradient(135deg, rgba(15, 23, 42, 0.92), rgba(11, 17, 32, 0.96) 60%);
  backdrop-filter: blur(8px);
}

.header-left{ display:flex; align-items:center; gap:10px; }
.header-logo{ width:60px; }
.header-text h4{ font-size:14px; opacity:.9; }
.header-text h2{ font-size:16px; color:#22d3ee; }
.header-right h1{ font-size:22px; }
.header-right h2{ font-size:14px; opacity:.8; }

/* ================= HERO SECTION ================= */
.hero-section{
  position:relative;
  z-index: 5;
  width:100%;
  height:480px; /* Sedikit lebih tinggi untuk menampung tombol */
  background:url('bg-2.png') center/cover no-repeat;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 30px 70px rgba(0,0,0,.35);
}

.hero-overlay{
  position:absolute;
  inset:0;
  background: linear-gradient(to bottom, rgba(15,23,42,0) 50%, rgba(15,23,42,0.4) 100%);
  display:flex;
  justify-content:center;
  align-items:flex-end;
  padding-bottom:50px;
}

/* MENU TOMBOL SERAGAM */
.hero-menu{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
  justify-content:center;
  width: 100%;
}

.hero-btn{
  background: white;
  color: #0f172a;
  text-decoration: none;
  font-size: 15px;
  font-weight: 600;
  padding: 15px 0;
  border-radius: 50px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  
  /* Panjang Seragam */
  width: 230px; 
}

.hero-btn:hover{
  transform: translateY(-5px);
  background: #0f172a;
  color: #22d3ee;
  box-shadow: 0 15px 35px rgba(0,0,0,0.3);
}

/* ================= RESPONSIVE ================= */
@media(max-width:1100px){
  .hero-btn { width: 200px; font-size: 13px; }
}

@media(max-width:900px){
  .sidebar{ left:-250px; }
  .toggle-btn{ left:10px; }
  .main{ margin-left:0; padding:20px; }
  .bg-decoration-corner { width: 280px; }
  .hero-section { height: auto; padding: 100px 0 40px 0; }
  .hero-overlay { position: relative; background: none; padding-bottom: 0; }
  .hero-menu { flex-direction: column; align-items: center; }
  .hero-btn { width: 85%; }
}
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <h2>MENU</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="WFA.html">Absensi</a>
  <a href="LaporanHarian.html">Laporan Harian</a>
  <a href="LaporanBulanan.html">Laporan Bulanan</a>
  <a href="grafik_rekap_smt.html">Rekap Semester</a>
</div>

<div class="toggle-btn" onclick="toggleSidebar()" id="toggleIcon">&lt;</div>

<div class="main" id="main">

  <img src="sudut_kiri_atas.png" class="bg-decoration-corner">

  <div class="header">
    <div class="header-left">
      <img src="logo.png" class="header-logo">
      <div class="header-text">
        <h4>UIN KIAI AGENG MUHAMMAD BESARI PONOROGO</h4>
        <h2>PASCASARJANA</h2>
      </div>
    </div>

    <div class="header-right">
      <h1>Monitoring Perkuliahan</h1>
      <h2 id="semesterTitle">Sedang memuat...</h2>
    </div>
  </div>

  <div class="hero-section">
    <div class="hero-overlay">
      <div class="hero-menu">
        <a href="WFA.html" class="hero-btn">Absensi</a>
        <a href="LaporanHarian.html" class="hero-btn">Laporan Harian</a>
        <a href="LaporanBulanan.html" class="hero-btn">Laporan Bulanan</a>
        <a href="grafik_rekap_smt.html" class="hero-btn">Rekap Semester</a>
      </div>
    </div>
  </div>

</div>

<script>
async function loadSemester() {
  try {
    const response = await fetch("https://script.google.com/macros/s/AKfycbxIBbwwa5Ig7Ep6YwzIq5Uz5lUzDUHB3QZMhNBOGcFWX_pb9ntnHI4h_wZV4OMRLrm-Pg/exec");
    const result = await response.json();
    let text = result.title.replace("REKAP ", "").replace("TA.", "").trim();
    document.getElementById("semesterTitle").innerText = text;
  } catch (err) {
    document.getElementById("semesterTitle").innerText = "Semester Tidak Tersedia";
  }
}

document.addEventListener("DOMContentLoaded", function(){
  loadSemester();
  let links = document.querySelectorAll(".sidebar a");
  let currentPage = window.location.pathname.split("/").pop();
  if(currentPage === "" || currentPage === "/") { currentPage = "dashboard.html"; }
  links.forEach(link => {
    if(link.getAttribute("href") === currentPage) link.classList.add("active");
  });
});

function toggleSidebar(){
  const sidebar = document.getElementById("sidebar");
  const main = document.getElementById("main");
  const toggle = document.getElementById("toggleIcon");
  sidebar.classList.toggle("hidden");
  main.classList.toggle("fullwidth");
  toggle.innerHTML = sidebar.classList.contains("hidden") ? "&gt;" : "&lt;";
  toggle.style.left = sidebar.classList.contains("hidden") ? "0px" : "250px";
}

// ANTI INSPECT
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("keydown", function(e){
  if (e.key === "F12") e.preventDefault();
  if (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J" || e.key === "C")) e.preventDefault();
  if (e.ctrlKey && e.key === "u") e.preventDefault();
});
</script>

</body>
</html>
