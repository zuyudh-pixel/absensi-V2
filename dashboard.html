<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informasi Perkuliahan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/4adad1b75f.js" crossorigin="anonymous"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

:root{
  --primary:#0F3D2E;
  --primary-soft:#145A41;
  --accent:#C6A75E;
  --bg:#e2e4e3;
  --text:#1C1C1C;
}

body{
  display:flex;
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
  position:relative;
}

/* ================= SIDEBAR ================= */
.sidebar{
  width:250px;
  background:var(--primary);
  padding:30px 18px;
  position:fixed;       /* fixed agar bisa geser */
  left:0;
  top:0;
  height:100%;
  transition:0.3s;
  color:white;
  z-index:2;
}

.sidebar.hidden{
  left:-250px;          /* geser penuh ke kiri */
}

.sidebar h2{
  font-size:13px;
  letter-spacing:2px;
  margin:50px 0 25px 10px;
  color:white;
}

.sidebar a{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 14px;
  border-radius:8px;
  color:white;
  text-decoration:none;
  margin-bottom:8px;
  transition:0.25s;
  font-size:14px;
}

.sidebar a i{
  min-width:24px;
  text-align:center;
}

.sidebar a:hover{
  background:var(--primary-soft);
}

.sidebar a.active{
  background:rgba(255,255,255,0.1);
  border-left:4px solid var(--accent);
}

/* ================= TOGGLE BUTTON ================= */
.toggle-btn{
  position:fixed;       
  top:22px;
  left:250px;           /* posisi default saat sidebar terbuka */
  background:var(--accent);
  border-radius:50%;
  width:34px;
  height:34px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  color:#000;
  font-weight:bold;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
  z-index:999;           
  transition:left 0.3s;
}

/* ================= MAIN ================= */
.main{
  flex:1;
  margin-left:250px;     /* ruang untuk sidebar */
  padding:35px 45px;
  position:relative;
  overflow:hidden;
  transition:margin-left 0.3s;
  background-image:url('sudut_kiri_atas.png');
  background-repeat:no-repeat;
  background-position:top left;
  background-size:400px;
}

/* jika sidebar disembunyikan, main geser ke kiri penuh */
.main.fullwidth{
  margin-left:0;
}

/* ================= HEADER ================= */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:var(--primary);
  padding:22px 35px;
  border-radius:14px;
  color:white;
  margin-bottom:40px;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
  position:relative;
  z-index:3;
}

.header-left{
  display:flex;
  align-items:center;
  gap:8px;
}

.header-logo{
  width:60px;
  height:auto;
}

.header-text h4{
  font-size:14px;
  font-weight:400;
  margin:0;
  opacity:0.9;
}

.header-text h2{
  font-size:16px;
  font-weight:600;
  margin:0;
  letter-spacing:1px;
  color:var(--accent);
}

.header-right h1{
  font-size:22px;
  font-weight:600;
}

.header-right h2{
  font-size:14px;
  margin-top:6px;
  opacity:0.9;
}

/* ================= MENU GRID ================= */
.menu-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:30px;
}

.menu-card{
  background:white;
  padding:35px;
  border-radius:12px;
  text-align:center;
  transition:0.3s;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  cursor:pointer;
  border:1px solid #e5e7eb;
  position:relative;
  z-index:1;
}

.menu-card:hover{
  transform:translateY(-5px);
  box-shadow:0 14px 28px rgba(0,0,0,0.12);
  border-color:var(--accent);
}

.menu-card i{
  font-size:26px;
  margin-bottom:15px;
  color:var(--primary);
}

.menu-card h4{
  font-weight:500;
  color:#1C1C1C;
}

/* ================= RESPONSIVE ================= */
@media(max-width:900px){
  .sidebar{
    left:-250px;
  }
  .toggle-btn{
    left:10px;
  }
  .main{
    margin-left:0;
    padding:25px;
  }
}
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <h2>MENU</h2>
  <a href="dashboard.html"><span>Dashboard</span></a>
  <a href="index_GitHub_Toas_Center.html"><span>Absensi</span></a>
  <a href="LaporanHarian1d.html"><span>Laporan Harian</span></a>
  <a href="LaporanRinciSemester.html"><span>Laporan Bulanan</span></a>
  <a href="grafik_rekap_smt.html"><span>Rekap Semester</span></a>
</div>

<div class="toggle-btn" onclick="toggleSidebar()" id="toggleIcon">&lt;</div>

<div class="main" id="main">

  <div class="header">
    <div class="header-left">
      <img src="logo.png" class="header-logo">
      <div class="header-text">
        <h4>UIN KIAI AGENG MUHAMMAD BESARI PONOROGO</h4>
        <h2>PASCASARJANA</h2>
      </div>
    </div>

    <div class="header-right">
      <h1>Monitoring Perkuliahan</h1>
      <h2 id="semesterTitle">Sedang memuat...</h2>
    </div>
  </div>

  <div class="menu-grid">
    <a href="index_GitHub_Toas_Center.html">
      <div class="menu-card">
        <i class="fas fa-user-check"></i>
        <h4>Absensi</h4>
      </div>
    </a>

    <a href="LaporanHarian1d.html">
      <div class="menu-card">
        <i class="fas fa-calendar-day"></i>
        <h4>Laporan Harian</h4>
      </div>
    </a>

    <a href="LaporanRinciSemester.html">
      <div class="menu-card">
        <i class="fas fa-file-alt"></i>
        <h4>Laporan Bulanan</h4>
      </div>
    </a>

    <a href="grafik_rekap_smt.html">
      <div class="menu-card">
        <i class="fas fa-chart-bar"></i>
        <h4>Rekap Semester</h4>
      </div>
    </a>
  </div>

</div>

<script>
function toggleSidebar(){
  const sidebar = document.getElementById("sidebar");
  const main = document.getElementById("main");
  const toggle = document.getElementById("toggleIcon");

  sidebar.classList.toggle("hidden");
  main.classList.toggle("fullwidth");

  // ubah ikon toggle
  toggle.innerHTML = sidebar.classList.contains("hidden") ? "&gt;" : "&lt;";

  // geser toggle agar selalu di pinggir sidebar
  toggle.style.left = sidebar.classList.contains("hidden") ? "0px" : "250px";
}

/* LOAD SEMESTER OTOMATIS */
async function loadSemester() {
  try {
    const response = await fetch("https://script.google.com/macros/s/AKfycbxIBbwwa5Ig7Ep6YwzIq5Uz5lUzDUHB3QZMhNBOGcFWX_pb9ntnHI4h_wZV4OMRLrm-Pg/exec");
    const result = await response.json();

    let text = result.title
      .replace("REKAP ", "")
      .replace("TA.", "")
      .trim();

    document.getElementById("semesterTitle").innerText = text;

  } catch (err) {
    document.getElementById("semesterTitle").innerText = "Semester Tidak Tersedia";
  }
}

document.addEventListener("DOMContentLoaded", function(){
  loadSemester();

  let links=document.querySelectorAll(".sidebar a");
  let currentPage=window.location.pathname.split("/").pop();
  if(currentPage===""){currentPage="dashboard.html";}
  links.forEach(link=>{
    if(link.getAttribute("href")===currentPage){
      link.classList.add("active");
    }
  });
});

// ANTI INSPECT SUPER AGRESIF
// ===============================

// Blokir klik kanan
document.addEventListener("contextmenu", e => e.preventDefault());

// Blokir shortcut developer tools
document.addEventListener("keydown", function(e){

  // F12
  if (e.key === "F12") e.preventDefault();

  // Ctrl+Shift+I/J/C
  if (e.ctrlKey && e.shiftKey && 
     (e.key === "I" || e.key === "J" || e.key === "C")) {
    e.preventDefault();
  }

  // Ctrl+U
  if (e.ctrlKey && e.key === "u") {
    e.preventDefault();
  }

  // Ctrl+S
  if (e.ctrlKey && e.key === "s") {
    e.preventDefault();
  }

});
</script>

</body>
</html>
