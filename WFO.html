<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absensi Dosen Pengampu</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:url("https://absensi-v2-self.vercel.app/gedung2.png") no-repeat center center fixed;
  background-size:cover;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px 10px;
  color:white;
  position:relative;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0);
  z-index:-1;
}
.card{
  background: rgba(251, 251, 252, 0.678); /* 50% transparan */
  // background:#1e293b;
  padding:20px;
  width:100%;
  max-width:420px;
  border-radius:20px;
  box-shadow:0 15px 40px rgba(0,0,0,.6);
  text-align:center;
  position:relative;
   border: 2px solid #ffffff; /* border putih */
}
video{
  width:100%;
  max-width:280px;
  border-radius:12px;
  border: 2px solid #ffffff; /* border putih */

}
.scan-box{
  position:absolute;
  width:180px;
  height:180px;
  border:3px solid #22c55e;
  border-radius:16px;
  top:58%;
  left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
  box-shadow:0 0 20px rgba(34,197,94,.5);
}
.status{
  margin-top:12px;
  font-size:14px;
  font-weight:600;
}
.status.ready{ color:#4405d6; }
.status.processing{ color:#4606f7; }
.status.error{ color:#910303; }
.time {
  font-size: 16px;
  color: rgba(255,255,255,.95);         /* teks putih */
  font-weight: 900;  
  text-shadow: 2px 2px 4px #000000; /* shadow hitam */
  margin: 5px 0;
}

.toast{
  position:fixed;
  top:30%;
  left:50%;
  transform:translate(-50%,-50%) scale(.9);
  background:rgba(255,255,255,.95);
  color:#111;
  padding:18px 24px;
  border-radius:16px;
  font-weight:600;
  box-shadow:0 20px 60px rgba(0,0,0,.3);
  opacity:0;
  transition:.3s;
  z-index:9999;
  max-width:90%;
  text-align:center;
}
.toast.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}
</style>
</head>

<body>


<div class="card">

  <!-- LOGO & HEADER DIPERTAHANKAN -->
  <img src="https://raw.githubusercontent.com/zuyudh-pixel/absensi-V2/main/logo.png" style="width:80px;">
  <div style="font-size:16px;color:#010107; font-weight:700;">
  UIN KIAI AGENG MUHAMMAD BESARI PONOROGO
</div>
<div style="font-size:26px;color:#79030d; font-weight:700;">
  PASCASARJANA
</div>
<div style="font-size:18px;color:#410492;margin-top:5px; font-weight:700;">
  ABSENSI DOSEN PENGAMPU
</div>
  <div class="time" id="timeNow"></div>

  <div style="position:relative; display:flex; justify-content:center;">
    <video id="video" autoplay playsinline></video>
    <div class="scan-box"></div>
  </div>

  <div class="status ready" id="statusText">🟢 Siap Scan Barcode</div>

</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzAf8h_8Je8-60pLsqP2-O6qxM-K3VqDPwX3ONeZOx-YPlv0vOKNC0BdHa7uzjcYuIilw/exec";

let videoStream=null;
let isProcessing=false;

const video=document.getElementById("video");
const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");
const statusText=document.getElementById("statusText");
const scanBox=document.querySelector(".scan-box");

// ================= JAM =================
setInterval(()=>{
  document.getElementById("timeNow").innerText=
    new Date().toLocaleDateString()+" - "+
    new Date().toLocaleTimeString();
},1000);

// ================= DOUBLE BEEP SCANNER =================
function playBeep(duration, frequency){
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const oscillator = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();

  oscillator.type = "square";
  oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);

  gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);

  oscillator.connect(gainNode);
  gainNode.connect(audioCtx.destination);

  oscillator.start();
  oscillator.stop(audioCtx.currentTime + duration / 1000);
}

function doubleBeep(){
  playBeep(100, 1400);
  setTimeout(()=>playBeep(100, 1000), 140);
}

// ================= STATUS =================
function setStatus(text,mode){
  statusText.innerText=text;
  statusText.className="status "+mode;
}

// ================= TOAST =================
function showToast(message){
  const t=document.getElementById("toast");
  t.innerText=message;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),3000);
}

// ================= EFFECT SCAN =================
function scanSuccessEffect(){
  scanBox.style.borderColor="#00ff88";
  scanBox.style.boxShadow="0 0 30px #00ff88";
  scanBox.style.transform="translate(-50%,-50%) scale(1.05)";
  setTimeout(()=>{
    scanBox.style.borderColor="#22c55e";
    scanBox.style.boxShadow="0 0 20px rgba(34,197,94,.5)";
    scanBox.style.transform="translate(-50%,-50%) scale(1)";
  },300);
}

// ================= CAMERA =================
async function startCamera(){
  try{
    videoStream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:"environment"}}
    });
    video.srcObject=videoStream;
    await video.play();
    scanLoop();
  }catch{
    setStatus("❌ Kamera gagal", "error");
  }
}

// ================= SCAN LOOP =================
function scanLoop(){
  if(video.readyState === video.HAVE_ENOUGH_DATA){
    canvas.width=video.videoWidth;
    canvas.height=video.videoHeight;
    ctx.drawImage(video,0,0);

    const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
    const code=jsQR(imageData.data,imageData.width,imageData.height);

    if(code && !isProcessing){
      isProcessing=true;
      processBarcode(code.data);
    }
  }
  requestAnimationFrame(scanLoop);
}

// ================= PROCESS =================
async function processBarcode(data){

  if(!data.includes("|")){
    setStatus("❌ Format salah", "error");
    cooldown();
    return;
  }

  const [id,password]=data.split("|");

  const fd=new FormData();
  fd.append("action","login");
  fd.append("id",id);
  fd.append("password",password);

  try{
    setStatus("⏳ Memproses...", "processing");
    scanBox.style.borderColor="#facc15";

    const res=await fetch(WEB_APP_URL,{method:"POST",body:fd});
    const r=await res.json();

    if(r.status==="success"){
      doubleBeep();
      scanSuccessEffect();
      setStatus("✅ "+r.tipe+" Berhasil", "ready");
      showToast("Selamat, Bpk/Ibu " + r.nama + ", berhasil. Terimakasih.");
    }
    else if(r.status==="absen_sudah_lengkap"){
      doubleBeep();
      scanSuccessEffect();
      setStatus("✅ Sudah lengkap hari ini", "ready");
      showToast("Bpk/Ibu " + r.nama + ", Sudah lengkap hari ini.");
    }
    else{
      playBeep(200,400);
      setStatus("❌ Login gagal", "error");
    }

  }catch{
    playBeep(200,300);
    setStatus("❌ Server error", "error");
  }

  cooldown();
}

// ================= COOLDOWN =================
function cooldown(){
  setTimeout(()=>{
    isProcessing=false;
    setStatus("🟢 Siap Scan Barcode", "ready");
    scanBox.style.borderColor="#22c55e";
  },2000);
}

// ================= AUTO RESET =================
setInterval(()=>{
  isProcessing=false;
  setStatus("🟢 Siap Scan Barcode", "ready");
},300000);

// ================= START =================
window.onload=startCamera;
</script>
<div class="toast" id="toast"></div>
</body>
</html>
