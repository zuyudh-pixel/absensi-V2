<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Rekap Perkuliahan</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100vh;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: #ffffff;
  display: flex;
  flex-direction: column;
  padding: 14px 20px;
}

/* ================= HEADER ================= */
.top-header {
  display: flex;
  align-items: center;
  margin-bottom: 6px;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-left img {
  width: 55px;
}

.header-text h1 {
  font-size: 12px;
  font-weight: 500;
  color: #ffffffcc;
}

.header-text h2 {
  font-size: 14px;
  font-weight: 600;
  color: #ffffffee;
}

/* ================= JUDUL ================= */
.rekap-title {
  text-align: center;
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 12px;
  color: #00ffcc;
  text-shadow: 0 0 10px rgba(0,255,200,0.6);
}

/* ================= FRAME CARD ================= */
.iframe-wrapper {
  flex: 1;
  width: 100%;
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  border: 1px solid rgba(0, 255, 200, 0.4);
  box-shadow: 
    0 8px 25px rgba(0, 255, 200, 0.25),
    inset 0 0 20px rgba(255, 255, 255, 0.05);
  padding: 12px;
  display: flex;
  flex-direction: column;
  transition: 0.3s ease;
}

.iframe-wrapper:hover {
  box-shadow: 
    0 12px 35px rgba(0, 255, 200, 0.35),
    inset 0 0 25px rgba(255, 255, 255, 0.08);
}

/* ================= IFRAME ================= */
iframe {
  flex: 1;
  width: 100%;
  border: none;
  border-radius: 14px;
  background: #ffffff;
}

/* ================= FOOTER INFO ================= */
.refresh-info {
  margin-top: 8px;
  font-size: 13px;
  text-align: center;
  color: #00ffcc;
}

/* ================= RESPONSIVE ================= */
@media (max-width: 768px) {
  .rekap-title {
    font-size: 15px;
  }
}
</style>
</head>
<body>

<!-- HEADER KIRI -->
<div class="top-header">
  <div class="header-left">
    <img src="https://raw.githubusercontent.com/zuyudh-pixel/absensi-V2/main/logo.png" alt="Logo UIN Ponorogo" />
    <div class="header-text">
      <h1>UIN KIAI AGENG MUHAMMAD BESARI PONOROGO</h1>
      <h2>PASCASARJANA</h2>
    </div>
  </div>
</div>

<!-- JUDUL CENTER SELEBAR SHEET -->
<div class="rekap-title">
  REKAP PERKULIAHAN SEMESTER GENAP T.A. 2025/2026
</div>

<!-- SHEET -->
<div class="iframe-wrapper">
  <iframe 
    id="sheetFrame"
    src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQzq1_5f6SRCLmWhp67jEIPR89jTT7nquF99sH-_6tP_ypdkOc9PQnWL_duMjDvyk05MWNvQPMgHEx3/pubhtml?gid=419371495&single=true"
    loading="lazy"
    referrerpolicy="no-referrer">
  </iframe>
  <div class="refresh-info">Refresh/update data per 3 menit</div>
</div>

<script>
function refreshIframe() {
  const iframe = document.getElementById('sheetFrame');
  iframe.src = iframe.src;
}
setInterval(refreshIframe, 180000);
</script>

</body>
</html>
