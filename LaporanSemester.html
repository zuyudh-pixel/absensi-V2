<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Rekap Absensi Responsive</title>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100vh;
    font-family: 'Poppins', sans-serif;
    background: #0f172a;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  .header {
    text-align: center;
    margin-bottom: 20px;
  }
  .header img { width: 70px; margin-bottom: 8px; }
  .header h1 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
    color: #ffffffdd;
  }
  .header h2 {
    font-size: 18px;
    font-weight: 700;
    color: #7FFF00;
    text-shadow: 0 0 8px #7FFF00;
  }
  h3.title {
    color: #7FFF00;
    margin-bottom: 12px;
    font-weight: 600;
    font-size: 18px;
    text-align: center;
    text-shadow: 0 0 8px #7FFF00;
  }

  .iframe-wrapper {
    width: 98vw;
    max-width: 1250px;
    height: 75vh;
    background: #1e3a8a;
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(127, 255, 0, 0.4),
                inset 0 0 15px rgba(127, 255, 0, 0.3);
    padding: 10px;
    display: flex;
    flex-direction: column;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 14px;
    background: #fff;
  }

  .refresh-info {
    margin-top: 8px;
    font-size: 14px;
    text-align: center;
    color: #66ccff;
    text-shadow: 0 0 6px #66ccff;
  }

  /* LANDSCAPE TV */
  @media (orientation: landscape) { .iframe-wrapper { height: 80vh; } }
  /* PORTRAIT TV */
  @media (orientation: portrait) { .iframe-wrapper { height: 88vh; } }
  /* MOBILE */
  @media (max-width: 600px) {
    .iframe-wrapper { height: 75vh; }
    .header h1 { font-size: 12px; }
    .header h2 { font-size: 15px; }
    h3.title { font-size: 14px; }
    .refresh-info { font-size: 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <img src="https://raw.githubusercontent.com/zuyudh-pixel/absensi-V2/main/logo.png" alt="Logo UIN Ponorogo" />
  <h1>UIN KIAI AGENG MUHAMMAD BESARI PONOROGO</h1>
  <h2>PASCASARJANA</h2>
</div>

<h3 class="title">REKAP PERKULIAHAN SEMESTER GENAP T.A. 2025/2026</h3>

<div class="iframe-wrapper" title="Rekap Absensi Google Sheet">
  <iframe 
    id="sheetFrame"
    src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQzq1_5f6SRCLmWhp67jEIPR89jTT7nquF99sH-_6tP_ypdkOc9PQnWL_duMjDvyk05MWNvQPMgHEx3/pubhtml?gid=419371495&single=true" 
    allowfullscreen 
    loading="lazy"
    referrerpolicy="no-referrer"
  ></iframe>
  <div class="refresh-info">Refresh/update data per 3 menit</div>
</div>

<script>
function refreshIframe() {
  const iframe = document.getElementById('sheetFrame');
  iframe.src = iframe.src; // reload iframe
}

// Refresh setiap 3 menit (180000 ms)
setInterval(refreshIframe, 180000);
</script>

</body>
</html>
