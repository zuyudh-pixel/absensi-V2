<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Rekap Bulanan Semester</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
height:100%;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:#fff;
display:flex;
flex-direction:column;
padding:14px;
}

.top-header{
display:flex;
align-items:center;
margin-bottom:10px;
}

.header-left{
display:flex;
align-items:center;
gap:12px;
}

.header-left img{width:75px;}

.header-text h1{font-size:14px;font-weight:700;}
.header-text h2{font-size:13px;font-weight:600;}

.rekap-title{
text-align:center;
font-size:18px;
font-weight:700;
margin:10px 0;
color:#00ffcc;
}

button.pdf-btn{
margin:0 auto 15px auto;
padding:10px 28px;
background:#00ffcc;
color:#000;
font-weight:bold;
border:none;
border-radius:50px;
cursor:pointer;
transition:.3s;
}
button.pdf-btn:hover{transform:scale(1.05);}

.table-frame{
flex:1;
display:flex;
flex-direction:column;
background:#ffffff;
border-radius:16px;
border:3px solid #004d40;
box-shadow:0 8px 25px rgba(0,0,0,0.3);
overflow:hidden;
}

.table-scroll{flex:1;overflow:auto;}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
min-width:max-content;
}

thead tr:first-child{height:42px;}
thead tr:nth-child(2){height:38px;}

th,td{
border:1px solid #000;
text-align:center;
padding:6px;
line-height:1.2;
}

thead th{
position:sticky;
color:#fff;
z-index:10;
}

thead tr:first-child th{
top:0;
background:#004d40;
font-weight:700;
}

thead tr:nth-child(2) th{
top:42px;
background:#00695c;
font-weight:600;
z-index:9;
}

td{color:#000;}
td:nth-child(2){text-align:left;white-space:nowrap;}

.wfo{background:#d4edda;color:#155724;font-weight:600;}
.wfa{background:#cce5ff;color:#004085;font-weight:600;}
.ijin{background:#f8d7da;color:#721c24;font-weight:600;}

.refresh-info{
margin-top:6px;
font-size:11px;
text-align:center;
color:#00ffcc;
}
</style>
</head>
<body>

<div class="top-header">
  <div class="header-left">
    <img id="logoImg" src="https://raw.githubusercontent.com/zuyudh-pixel/absensi-V2/main/logo.png">
    <div class="header-text">
      <h1>KEMENTERIAN AGAMA REPUBLIK INDONESIA</h1>
      <h1>UIN KIAI AGENG MUHAMMAD BESARI PONOROGO</h1>
      <h2>PASCASARJANA</h2>
    </div>
  </div>
</div>

<h2 class="rekap-title" id="rekapTitle">Memuat data...</h2>
<button class="pdf-btn" onclick="downloadPDF()">Download PDF</button>

<div class="table-frame">
  <div class="table-scroll">
    <table id="rekapTable">
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div class="refresh-info">
Data diperbarui otomatis setiap akses dan setiap 5 menit
</div>

<script>
const WEB_APP_URL="https://script.google.com/macros/s/AKfycbyCj0kNeBGQ93IANJDcFOLBFVcN-pWyFsJ9WRggcME85iFyOUfYX9-3OAaPdqmD9Jw-yw/exec";

let currentData=[];
let months=[];
let semester='';
let tahunAjaran='';

async function loadData(){
document.getElementById("rekapTitle").innerText="Memuat data...";
try{
const res=await fetch(WEB_APP_URL);
const json=await res.json();
document.getElementById("rekapTitle").innerText=json.title;
currentData=json.data;
months=json.headerMonths;
semester=json.semester||'GENAP';
tahunAjaran=json.tahunAjaran||'2025/2026';
renderTable(currentData,months);
}catch(e){
document.getElementById("rekapTitle").innerText="Gagal memuat data";
}
}

function renderTable(data,months){
const thead=document.querySelector("#rekapTable thead");
const tbody=document.querySelector("#rekapTable tbody");

let header1="<tr><th rowspan='2'>No</th><th rowspan='2'>Nama</th>";
months.forEach(m=>{header1+=`<th colspan='3'>${m}</th>`;});
header1+=`<th colspan='4'>TOTAL</th></tr>`;

let header2="<tr>";
months.forEach(()=>{header2+="<th>Lur</th><th>Dar</th><th>Ijin</th>";});
header2+="<th>Lur</th><th>Dar</th><th>Ijin</th><th>Akhir</th></tr>";

thead.innerHTML=header1+header2;

tbody.innerHTML="";
data.forEach((r,i)=>{
let row=`<td>${i+1}</td><td>${r.nama}</td>`;
months.forEach(m=>{
if(r[m]){
const p=r[m].split("/");
row+=`<td class="wfo">${p[0]}</td>
<td class="wfa">${p[1]}</td>
<td class="ijin">${p[2]}</td>`;
}else row+=`<td>0</td><td>0</td><td>0</td>`;
});
row+=`<td class="wfo">${r.WFO}</td>
<td class="wfa">${r.WFA}</td>
<td class="ijin">${r.IJIN}</td>
<td>${r.total}</td>`;
tbody.innerHTML+=`<tr>${row}</tr>`;
});
}

/* ================= PDF PREMIUM DENGAN ALAMAT ================= */

function downloadPDF(){

if(currentData.length===0){alert("Data belum dimuat");return;}

const { jsPDF }=window.jspdf;
const doc=new jsPDF('landscape','mm','a4');
const pageWidth=doc.internal.pageSize.getWidth();
const centerX=pageWidth/2;

const img=document.getElementById("logoImg");

/* ================= LOGO ================= */
doc.addImage(img,'PNG',15,10,28,28);

/* ================= KOP ================= */
doc.setFont("helvetica","bold");
doc.setFontSize(14);
doc.text("KEMENTERIAN AGAMA REPUBLIK INDONESIA",centerX,18,{align:"center"});
doc.text("UIN KIAI AGENG MUHAMMAD BESARI PONOROGO",centerX,24,{align:"center"});
doc.text("PASCASARJANA",centerX,30,{align:"center"});

/* ================= ALAMAT ================= */
doc.setFont("helvetica","normal");
doc.setFontSize(10);
doc.text("Alamat : Jl. Pramuka 156, Ronowijayan, Siman, Ponorogo 63471",centerX,36,{align:"center"});
doc.text("Website : www.pasca.uinponorogo.ac.id  Email : pasca@uinponorogo.ac.id",centerX,41,{align:"center"});

/* ================= GARIS ================= */
doc.setLineWidth(1.2);
doc.line(10,46,pageWidth-10,46);

/* ================= JUDUL ================= */
doc.setFont("helvetica","bold");
doc.setFontSize(12);
doc.text("LAPORAN PERKULIAHAN SEMESTER "+semester+" TA "+tahunAjaran,centerX,54,{align:"center"});

/* ================= TABEL ================= */
doc.autoTable({
html:"#rekapTable",
startY:60,
theme:'grid',
styles:{fontSize:7},
headStyles:{
fillColor:[0,0,0],
textColor:[255,255,255],
fontStyle:'bold'
}
});

/* ================= TANDA TANGAN ================= */

let finalY = doc.lastAutoTable.finalY + 12;

/* Format tanggal Indonesia */
const bulanIndo = [
"Januari","Februari","Maret","April","Mei","Juni",
"Juli","Agustus","September","Oktober","November","Desember"
];

const today = new Date();
const tanggalIndo = today.getDate()+" "+
bulanIndo[today.getMonth()]+" "+
today.getFullYear();

/* ================= POSISI SISI KANAN TAPI RATA KIRI ================= */

/* Tentukan margin blok kanan */
const rightBlockX = pageWidth - 80; 
// 80 mm dari kanan → membentuk kolom tanda tangan

doc.setFont("helvetica","normal");
doc.setFontSize(11);

/* Semua rata kiri tapi berada di sisi kanan */
doc.text("Ponorogo, "+tanggalIndo, rightBlockX, finalY);
doc.text("Direktur,", rightBlockX, finalY+6);
doc.text(" ", rightBlockX, finalY+6);
doc.text(" ", rightBlockX, finalY+6);
doc.text("..........................................................", rightBlockX, finalY+36);

doc.save("Laporan_Semester.pdf");
}

loadData();
setInterval(loadData,300000);
</script>

</body>
</html>
